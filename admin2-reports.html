<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main fade-in">

<script src="shared.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  databaseURL: "https://kristal-adb78-default-rtdb.firebaseio.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

document.getElementById("sidebar-mount").innerHTML = buildSidebar("admin2", "reports");
document.getElementById("topbar-mount").innerHTML = buildTopbar("Reports", "admin2");

// ======================
// STATE
// ======================
let evaluations = [];
let offices = {};
let selectedOffice = "";
let startDate = "";
let endDate = "";
let savedReports = [];
let currentReport = null; // snapshot of the last generated report, ready to save

// Dimension definitions — matches the 4 questions on the actual
// Cleanliness Evaluation Form (rating1 -> rating4, in order).
const DIMENSIONS = [
  { id: 1, field: "rating1", label: "The area is clean and properly maintained" },
  { id: 2, field: "rating2", label: "Overall cleanliness of the area" },
  { id: 3, field: "rating3", label: "Consistency of cleanliness throughout the area" },
  { id: 4, field: "rating4", label: "Overall satisfaction with the cleanliness" }
];

const RATING_SCALE = [
  { min: 90, label: "Outstanding", class: "rating-outstanding" },
  { min: 75, label: "Very Satisfactory", class: "rating-very-satisfactory" },
  { min: 60, label: "Satisfactory", class: "rating-satisfactory" },
  { min: 0, label: "Needs Improvement", class: "rating-poor" }
];

// ======================
// LOAD OFFICES
// ======================
onValue(ref(db, "cleanliness/office"), (snapshot) => {
  const data = snapshot.val() || {};
  offices = {};
  Object.entries(data).forEach(([key, val]) => {
    offices[key] = (val && val.name) ? val.name : key;
  });
  populateLocationFilter();
});

// ======================
// LOAD EVALUATIONS
// ======================
// Schema (matches the actual DB record):
// comments, date, officeName, rating1-4, status, timestamp, userId
onValue(ref(db, "cleanliness/cleanlinessevaluation"), (snapshot) => {
  const data = snapshot.val() || {};
  evaluations = Object.entries(data).map(([id, ev]) => ({
    id,
    officeName: ev.officeName || "Unknown",
    comments: ev.comments || "",
    date: ev.date || "",
    rating1: Number(ev.rating1) || 0,
    rating2: Number(ev.rating2) || 0,
    rating3: Number(ev.rating3) || 0,
    rating4: Number(ev.rating4) || 0,
    status: ev.status || "pending",
    timestamp: Number(ev.timestamp) || 0,
    userId: ev.userId || ""
  }));
  // Auto-render stats whenever evaluations load
  renderStats([]);
});

// ======================
// LOAD SAVED REPORTS
// ======================
onValue(ref(db, "cleanliness/savedReports"), (snapshot) => {
  const data = snapshot.val() || {};
  savedReports = Object.entries(data).map(([id, r]) => ({ id, ...r }));
  savedReports.sort((a, b) => (b.savedOn || 0) - (a.savedOn || 0));
  renderSavedReports();
  document.getElementById("stat-saved").textContent = savedReports.length;
});

// ======================
// HELPERS
// ======================
function getRatingLabel(percentage) {
  for (const rating of RATING_SCALE) {
    if (percentage >= rating.min) {
      return { label: rating.label, class: rating.class };
    }
  }
  return { label: "Needs Improvement", class: "rating-poor" };
}

function evalAvgScore(e) {
  return (e.rating1 + e.rating2 + e.rating3 + e.rating4) / 4;
}

function populateLocationFilter() {
  const select = document.getElementById("location-filter");
  const current = select.value;
  const names = Object.values(offices).sort((a, b) => a.localeCompare(b));
  select.innerHTML = ['<option value="">Select Office...</option>']
    .concat(names.map(n => `<option value="${n}">${n}</option>`)).join("");
  select.value = current;
}

function formatDateShort(dateStr) {
  if (!dateStr) return "-";
  return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }).split('/').reverse().join('-');
}

// ======================
// STATS — Calculate from ALL evaluations (like Admin 1)
// ======================
function renderStats(filteredEvals) {
  // Render KPIs from ALL evaluations in the system
  const total = evaluations.length;
  document.getElementById("stat-total").textContent = total;

  if (total === 0) {
    document.getElementById("stat-positive").textContent = "0";
    document.getElementById("stat-negative").textContent = "0";
    return;
  }

  const positive = evaluations.filter(e => evalAvgScore(e) >= 4).length;
  const negative = evaluations.filter(e => evalAvgScore(e) < 3).length;
  document.getElementById("stat-positive").textContent = positive;
  document.getElementById("stat-negative").textContent = negative;
}

// ======================
// GENERATE NARRATIVE (like Admin 1)
// ======================
function generateNarrative(office, respondents, overallPct, dimensionAverages) {
  const perfWord = overallPct >= 90 ? "outstanding" : overallPct >= 75 ? "very satisfactory" : overallPct >= 60 ? "satisfactory" : "needs improvement";
  const topDims = dimensionAverages.filter(d => parseFloat(d.percentage) >= 90).map(d => d.dimension);
  const lowDims = dimensionAverages.filter(d => parseFloat(d.percentage) < 75).map(d => d.dimension);
  const highDims = dimensionAverages.filter(d => parseFloat(d.percentage) >= 80).slice(0, 3).map(d => d.dimension);

  const p1 = `The <strong>results</strong> of the Cleanliness Evaluation Report for the <strong>${office}</strong>, Iloilo State University of Fisheries Science and Technology – San Enrique Campus, with <strong>${respondents}</strong> respondent(s), show an <strong>${perfWord} performance</strong> in cleanliness standards with an average satisfaction rate of <strong>${overallPct.toFixed(2)}%</strong>.
    ${topDims.length ? `This indicates that the area excels in ${topDims.join(", ")}, reflecting strong maintenance and cleanliness practices.` : ""}`;

  const p2 = `<strong>Regarding specific evaluation dimensions</strong>,
    ${highDims.length ? `${highDims.join(", ")} demonstrated excellent performance, indicating consistent cleanliness and proper maintenance standards.` : "the facility maintains satisfactory cleanliness levels."}
    ${lowDims.length ? `Additionally, ${lowDims.join(", ")} scored slightly lower, indicating opportunities for improvement in these areas to enhance overall cleanliness and user satisfaction.` : "All dimensions performed at satisfactory levels or above."}`;

  const p3 = `<strong>Overall</strong>, the facility continues to maintain <strong>${perfWord} cleanliness standards</strong>. Continued attention to maintenance protocols and regular evaluations will help sustain and improve these results. Any identified areas for improvement should be prioritized to ensure the highest standards of cleanliness and facility management.`;

  return [p1, p2, p3];
}

// ======================
// GENERATE REPORT
// ======================
function generateReport() {
  if (!selectedOffice) {
    alert("Please select an office");
    return;
  }

  if (!startDate || !endDate) {
    alert("Please select both start and end dates");
    return;
  }

  const officeEvals = evaluations.filter(e => e.officeName === selectedOffice);

  const startTs = new Date(startDate).getTime();
  const endTs = new Date(endDate).getTime() + (24 * 60 * 60 * 1000); // Include end date

  const filteredEvals = officeEvals.filter(e => e.timestamp >= startTs && e.timestamp <= endTs);

  renderStats(filteredEvals);

  if (filteredEvals.length === 0) {
    document.getElementById("report-container").innerHTML = `
      <div class="empty-state">No evaluations found for the selected office and date range.</div>
    `;
    currentReport = null;
    document.getElementById("btn-save-report").disabled = true;
    document.getElementById("reportPreview").style.display = "block";
    return;
  }

  // Calculate averages for each dimension (rating1 -> rating4)
  const dimensionAverages = [];

  DIMENSIONS.forEach(dim => {
    const values = filteredEvals.map(e => e[dim.field]).filter(v => v > 0);
    if (values.length > 0) {
      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      const percentage = (avg / 5) * 100; // Convert 1-5 scale to 0-100%
      const rating = getRatingLabel(percentage);
      dimensionAverages.push({
        dimension: dim.label,
        percentage: percentage.toFixed(1),
        rating
      });
    }
  });

  const overallPct = dimensionAverages.reduce((sum, d) => sum + parseFloat(d.percentage), 0) / dimensionAverages.length;
  const overallRating = getRatingLabel(overallPct);

  // Snapshot ready to be saved
  currentReport = {
    office: selectedOffice,
    startDate,
    endDate,
    respondents: filteredEvals.length,
    avgSatisfaction: overallPct.toFixed(1),
    ratingLabel: overallRating.label,
    ratingClass: overallRating.class,
    dimensionAverages,
    generatedAt: new Date().toISOString()
  };

  // Create official document (with letterhead, narrative, signatures, footer)
  const officialDoc = createOfficialDocument(currentReport);
  document.getElementById("report-container").innerHTML = officialDoc;

  document.getElementById("previewLabel").textContent = `📄 Report Preview — ${selectedOffice}  (${startDate} → ${endDate})`;
  document.getElementById("reportPreview").style.display = "block";
  document.getElementById("reportPreview").scrollIntoView({ behavior: "smooth", block: "start" });

  document.getElementById("btn-save-report").disabled = false;
}

// ======================
// EXPORT PDF (like Admin 1)
// ======================
window.exportPDF = async () => {
  if (document.getElementById("reportPreview").style.display === "none" || !currentReport) {
    alert("Please generate or view a report first.");
    return;
  }

  const officialDoc = createOfficialDocument(currentReport);
  document.getElementById("officialDocument").innerHTML = officialDoc;

  let canvas;
  try {
    canvas = await html2canvas(document.getElementById("csmPage"), {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    });
    var img = canvas.toDataURL("image/png");
  } catch (err) {
    console.error(err);
    alert("⚠ PDF export blocked by the browser.\n\nPlease serve this page over HTTP instead of opening it directly from disk.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: "mm", format: "a4" });
  const margin = 10;
  const usableW = pdf.internal.pageSize.getWidth() - margin * 2;
  const usableH = pdf.internal.pageSize.getHeight() - margin * 2;
  const scale = usableW / canvas.width;
  const pdfH = canvas.height * scale;

  if (pdfH <= usableH) {
    pdf.addImage(img, "PNG", margin, margin, usableW, pdfH);
  } else {
    const slicePx = Math.floor(usableH / scale);
    let offset = 0;
    while (offset < canvas.height) {
      const sc = document.createElement("canvas");
      sc.width = canvas.width;
      sc.height = Math.min(slicePx, canvas.height - offset);
      sc.getContext("2d").drawImage(canvas, 0, -offset);
      pdf.addImage(sc.toDataURL("image/png"), "PNG", margin, margin, usableW, sc.height * scale);
      offset += slicePx;
      if (offset < canvas.height) pdf.addPage();
    }
  }

  const name = (currentReport?.office || "report").replace(/\s+/g, "_");
  pdf.save(`CER_Report_${name}.pdf`);
  
  document.getElementById("officialDocument").innerHTML = "";
};


// ======================
// SAVE REPORT
// ======================
function saveReport() {
  if (!currentReport) return;

  const payload = { ...currentReport, savedOn: Date.now() };
  push(ref(db, "cleanliness/savedReports"), payload)
    .then(() => {
      document.getElementById("btn-save-report").disabled = true;
    })
    .catch(err => {
      alert("Could not save report: " + err.message);
    });
}

  const container = document.getElementById("saved-reports-container");

            <td>

              </div>
            </td>
          </tr>
        `).join("")}

  `;

  container.querySelectorAll(".btn-view").forEach(btn => {

  container.querySelectorAll(".btn-delete").forEach(btn => {
    btn.addEventListener("click", () => deleteSavedReport(btn.dataset.id));
  });
}

function viewSavedReport(id) {
  const r = savedReports.find(sr => sr.id === id);
  if (!r) return;

  const reportStart = new Date(r.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const reportEnd = new Date(r.endDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const generatedDate = new Date(r.savedOn).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const officialDoc = createOfficialDocument(r);
  document.getElementById("report-container").innerHTML = officialDoc;

  document.getElementById("previewLabel").textContent = `📄 Report Preview — ${r.office}  (${r.startDate} → ${r.endDate})`;
  document.getElementById("reportPreview").style.display = "block";
  document.getElementById("reportPreview").scrollIntoView({ behavior: "smooth", block: "start" });

  // Reflect the saved report's filters back into the filter bar
  document.getElementById("location-filter").value = r.office;
  document.getElementById("start-date").value = r.startDate;
  document.getElementById("end-date").value = r.endDate;
  selectedOffice = r.office;
  startDate = r.startDate;
  endDate = r.endDate;
  currentReport = r;  // Set to enable PDF export
  document.getElementById("btn-save-report").disabled = true;
}

function deleteSavedReport(id) {
  if (!confirm("Delete this saved report? This cannot be undone.")) return;
  remove(ref(db, `cleanliness/savedReports/${id}`)).catch(err => {
    alert("Could not delete report: " + err.message);
  });
}

// ======================
// EXPORT CSV
// ======================
document.getElementById("btn-export-csv").addEventListener("click", () => {
  if (!selectedOffice || !startDate || !endDate) {
    alert("Please generate a report first");
    return;
  }

  const officeEvals = evaluations.filter(e => e.officeName === selectedOffice);
  const startTs = new Date(startDate).getTime();
  const endTs = new Date(endDate).getTime() + (24 * 60 * 60 * 1000);
  const filteredEvals = officeEvals.filter(e => e.timestamp >= startTs && e.timestamp <= endTs);

  if (filteredEvals.length === 0) {
    alert("No data to export.");
    return;
  }

  const dimensionAverages = [];

  DIMENSIONS.forEach(dim => {
    const values = filteredEvals.map(e => e[dim.field]).filter(v => v > 0);
    if (values.length > 0) {
      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      const percentage = (avg / 5) * 100;
      const rating = getRatingLabel(percentage);
      dimensionAverages.push({
        dimension: dim.label,
        percentage: percentage.toFixed(1),
        rating: rating.label
      });
    }
  });

  const header = ["Evaluation Question", "Percentage (%)", "Rating"];
  const csvRows = dimensionAverages.map(da => [
    `"${da.dimension.replace(/"/g, '""')}"`,
    da.percentage,
    da.rating
  ].join(","));

  const csvContent = [header.join(","), ...csvRows].join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `campusvoice-report-${selectedOffice}-${startDate}-to-${endDate}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});
