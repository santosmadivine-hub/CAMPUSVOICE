<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusVoice – Reports | Admin 2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  @media print {
    #sidebar-mount, #topbar-mount, .filter-row, .stat-grid, .saved-reports-section { display: none !important; }
    .report-section { break-inside: avoid; }
  }

  /* Filter Bar */
  .filter-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
    background: #fff;
    border-radius: 14px;
    padding: 18px;
    border: 1px solid #bae6fd;
  }

  .filter-select, .filter-date {
    padding: 10px 14px;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: #fff;
    cursor: pointer;
  }

  .filter-select:focus, .filter-date:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .filter-date {
    cursor: text;
  }

  .filter-select {
    flex: 1;
    min-width: 160px;
  }

  .btn-generate {
    padding: 10px 18px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-generate:hover {
    background: #1d4ed8;
  }

  .btn-save {
    padding: 10px 18px;
    background: #16a34a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-save:hover {
    background: #15803d;
  }

  .btn-save:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .empty-state {
    text-align: center;
    color: #94a3b8;
    padding: 40px 0;
    font-family: 'DM Sans', sans-serif;
  }

  /* ─── Summary stat cards — identical to Admin 1's stat-card system ─── */
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:20px;
    margin-bottom: 24px;
  }

  .stat-card{
    position:relative;
    background:#ffffff;
    border:1px solid #bae6fd;
    border-top:4px solid var(--accent3, #2563eb);
    border-radius:16px;
    padding:20px 20px 22px;
    box-shadow:0 4px 14px rgba(15,23,42,0.05);
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .stat-card.blue{ border-top-color:#2563eb; }
  .stat-card.green{ border-top-color:#2563eb; }

  .stat-icon{
    position:absolute;
    top:18px;
    right:18px;
    width:38px;
    height:38px;
    border-radius:10px;
    background:#f1f5f9;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
  }

  .stat-label{
    font-family:'DM Sans',sans-serif;
    font-size:13px;
    font-weight:500;
    color:#64748b;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .stat-value{
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:30px;
    color:#0f172a;
    line-height:1.1;
    overflow-wrap:anywhere;
  }

  .stat-sub{
    font-family:'DM Sans',sans-serif;
    font-size:12px;
    color:#94a3b8;
  }

  @media (max-width: 1200px) {
    .stat-value {
      font-size: 30px;
    }
  }

  @media (max-width: 1024px) {
    .stat-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 900px) {
    .stat-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .stat-grid {
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
  }

  @media (max-width: 600px) {
    .stat-card {
      padding: 16px 16px 18px;
    }
    .stat-value {
      font-size: 26px;
    }
    .stat-icon {
      width: 32px;
      height: 32px;
      font-size: 14px;
      top: 14px;
      right: 14px;
    }
  }

  @media (max-width: 480px) {
    .stat-grid {
      grid-template-columns: 1fr;
    }
    .stat-value {
      font-size: 28px;
    }
  }

  @media (max-width: 360px) {
    .stat-grid {
      gap: 10px;
    }

      padding: 14px 14px 18px;

  /* Report Preview Wrapper */
  #reportPreview {
    display: none;
    background: #fff;
    border: 1px solid #bae6fd;
    border-radius: 12px;

  .btn-close:hover {

  /* Report Section */

  /* Summary Table */

  .btn-view {

  /* Official Document Style (like Admin 1) */

  .official-narrative {

<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main fade-in">
    <div id="topbar-mount"></div>

    <div class="filter-row">
      <input type="date" class="filter-date" id="start-date">
      <input type="date" class="filter-date" id="end-date">

      <select class="filter-select" id="location-filter">
        <option value="">Select Office...</option>
      </select>

      <button class="btn-generate" id="btn-generate-report">📊 Generate Report</button>
      <button class="btn-save" id="btn-save-report" disabled>💾 Save Report</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card blue">
        <div class="stat-icon">📝</div>
        <div class="stat-label">Total Feedback</div>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-sub">All Evaluations</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon">👍</div>
        <div class="stat-label">Positive (≥4★)</div>
        <div class="stat-value" id="stat-positive">0</div>
        <div class="stat-sub">Highly Rated</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon">👎</div>
        <div class="stat-label">Negative (&lt;3★)</div>
        <div class="stat-value" id="stat-negative">0</div>
        <div class="stat-sub">Needs Attention</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">💾</div>
        <div class="stat-label">Saved Reports</div>
        <div class="stat-value" id="stat-saved">0</div>
        <div class="stat-sub">Generated</div>
      </div>
    </div>

    <!-- REPORT PREVIEW (shown/hidden like Admin 1) -->
    <div id="reportPreview">
      <div class="preview-bar">
        <span class="preview-label" id="previewLabel">📄 Report Preview</span>
        <button class="btn btn-green" onclick="exportPDF()" style="padding:8px 14px;font-size:13px;">⬇ PDF</button>
        <button class="btn-close" onclick="closeReport()">✕ Close</button>
      </div>
      <div id="report-container"></div>
      <div id="officialDocument" style="display:none;"></div>
    </div>

    <div class="saved-reports-section">
      <div class="saved-reports-header">
        <h2>📋 Saved Reports</h2>
        <span class="saved-reports-count" id="saved-reports-count">0 reports</span>
      </div>
      <div id="saved-reports-container"></div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy,
  addDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("sidebar-mount").innerHTML = buildSidebar("admin2", "reports");
document.getElementById("topbar-mount").innerHTML = buildTopbar("Reports", "admin2");

// ======================
// FIRESTORE COLLECTION NAME / SCHEMA CONSTANTS
// (matches Evaluation Management page exactly)
// ======================
const OFFICES_COLLECTION = "office-names";
const EVALUATIONS_COLLECTION = "cleanliness_evaluations";
const SAVED_REPORTS_COLLECTION = "savedReports";

// Confirmed from Firestore console (see Evaluation Management page):
// cleanliness_evaluations documents store rating1 ... rating15, not
// just rating1-4. Everything that loops over rating questions drives
// off this constant so there's only one place to change it.
const TOTAL_RATING_QUESTIONS = 15;

// ======================
// STATE
// ======================
let evaluations = [];
let offices = {};
let selectedOffice = "";
let startDate = "";
let endDate = "";
let savedReports = [];
let currentReport = null; // snapshot of the last generated report, ready to save

const KNOWN_DIMENSION_LABELS = {
  1: "The area surrounding the office is free from litter.",
  2: "The office entrance is clean and well-maintianed.",
  3: "The walkways leading to the office are clean.",
  4: "Outdoor trash bins are available and regularly emptied.",
  5: "The exterior walls and windows are clean.",
  6: "The office floor is clean and free from dirt or dust.",
  7: "Office furniture (chairs, tables, counters) is clean.",
  8: "Windows and glass surfaces inside the office are clean.",
  9: "The office is free from unpleasant odors.",
  10: "The overall appearance of the office reflects proper cleanliness.",
  11: "The comfort room floor is clean and dry.",
  12: "The toilets and urinals are clean and sanitary.",
  13: "The sinks and faucets are clean and functioning properly.",
  14: "Trash bins inside the comfort room are clean and regularly emptied.",
  15: "There are no unpleasant odors inside the comfort room."
};

const DIMENSIONS = [];
for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
  DIMENSIONS.push({
    id: i,
    field: "rating" + i,
    label: KNOWN_DIMENSION_LABELS[i] || `Evaluation Question ${i}`
  });
}

const RATING_SCALE = [
  { min: 90, label: "Outstanding", class: "rating-outstanding" },
  { min: 75, label: "Very Satisfactory", class: "rating-very-satisfactory" },
  { min: 60, label: "Satisfactory", class: "rating-satisfactory" },
  { min: 0, label: "Needs Improvement", class: "rating-poor" }
];

// ======================
// LOAD OFFICES (Firestore: office-names)
// ======================
onSnapshot(collection(db, OFFICES_COLLECTION), (snapshot) => {
  offices = {};
  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    offices[docSnap.id] = data.name || data.officeName || docSnap.id;
  });
  populateLocationFilter();
});

// ======================
// LOAD EVALUATIONS (Firestore: cleanliness_evaluations)
// ======================
// Schema (matches the actual Firestore documents, same as the
// Evaluation Management page): comments, officeName,
// rating1...rating15, status, timestamp (numeric).
const evalQuery = query(collection(db, EVALUATIONS_COLLECTION), orderBy("timestamp", "desc"));

onSnapshot(evalQuery, (snapshot) => {
  evaluations = [];
  snapshot.forEach((docSnap) => {
    const ev = docSnap.data();
    const record = {
      id: docSnap.id,
      officeName: ev.officeName || "Unknown",
      comments: ev.comments || "",
      status: (ev.status || "").toString().toLowerCase() === "resolved" ? "resolved" : "pending",
      timestamp: Number(ev.timestamp) || 0
    };
    for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
      record["rating" + i] = Number(ev["rating" + i]) || 0;
    }
    evaluations.push(record);
  });
  // Auto-render stats whenever evaluations load
  renderStats([]);
});

// ======================
// LOAD SAVED REPORTS (Firestore: savedReports)
// ======================
const savedReportsQuery = query(collection(db, SAVED_REPORTS_COLLECTION), orderBy("savedOn", "desc"));

onSnapshot(savedReportsQuery, (snapshot) => {
  savedReports = [];
  snapshot.forEach((docSnap) => {
    savedReports.push({ id: docSnap.id, ...docSnap.data() });
  });
  renderSavedReports();
  document.getElementById("stat-saved").textContent = savedReports.length;
});

// ======================
// HELPERS
// ======================
function getRatingLabel(percentage) {
  for (const rating of RATING_SCALE) {
    if (percentage >= rating.min) {
      return { label: rating.label, class: rating.class };
    }
  }
  return { label: "Needs Improvement", class: "rating-poor" };
}

function evalAvgScore(e) {
  let sum = 0;
  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    sum += e["rating" + i] || 0;
  }
  return sum / TOTAL_RATING_QUESTIONS;
}

function populateLocationFilter() {
  const select = document.getElementById("location-filter");
  const current = select.value;
  const names = Object.values(offices).sort((a, b) => a.localeCompare(b));
  select.innerHTML = ['<option value="">Select Office...</option>']
    .concat(names.map(n => `<option value="${n}">${n}</option>`)).join("");
  select.value = current;
}

function formatDateShort(dateStr) {
  if (!dateStr) return "-";
  return new Date(dateStr).toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }).split('/').reverse().join('-');
}

// ======================
// STATS — Calculate from ALL evaluations (like Admin 1)
// ======================
function renderStats(filteredEvals) {
  // Render KPIs from ALL evaluations in the system
  const total = evaluations.length;
  document.getElementById("stat-total").textContent = total;

  if (total === 0) {
    document.getElementById("stat-positive").textContent = "0";
    document.getElementById("stat-negative").textContent = "0";
    return;
  }

  const positive = evaluations.filter(e => evalAvgScore(e) >= 4).length;
  const negative = evaluations.filter(e => evalAvgScore(e) < 3).length;
  document.getElementById("stat-positive").textContent = positive;
  document.getElementById("stat-negative").textContent = negative;
}

// ======================
// GENERATE NARRATIVE (like Admin 1)

function generateNarrative(office, respondents, overallPct, dimensionAverages) {
  const perfWord = overallPct >= 90 ? "outstanding" : overallPct >= 75 ? "very satisfactory" : overallPct >= 60 ? "satisfactory" : "needs improvement";
  const topDims = dimensionAverages.filter(d => parseFloat(d.percentage) >= 90).map(d => d.dimension);
  const lowDims = dimensionAverages.filter(d => parseFloat(d.percentage) < 75).map(d => d.dimension);
  const highDims = dimensionAverages.filter(d => parseFloat(d.percentage) >= 80).slice(0, 3).map(d => d.dimension);

  const p1 = `The <strong>results</strong> of the Cleanliness Evaluation Report for the <strong>${office}</strong>, Iloilo State University of Fisheries Science and Technology – San Enrique Campus, with <strong>${respondents}</strong> respondent(s), show an <strong>${perfWord} performance</strong> in cleanliness standards with an average satisfaction rate of <strong>${overallPct.toFixed(2)}%</strong>.
    ${topDims.length ? `This indicates that the area excels in ${topDims.join(", ")}, reflecting strong maintenance and cleanliness practices.` : ""}`;

  const p2 = `<strong>Regarding specific evaluation dimensions</strong>,
    ${highDims.length ? `${highDims.join(", ")} demonstrated excellent performance, indicating consistent cleanliness and proper maintenance standards.` : "the facility maintains satisfactory cleanliness levels."}
    ${lowDims.length ? `Additionally, ${lowDims.join(", ")} scored slightly lower, indicating opportunities for improvement in these areas to enhance overall cleanliness and user satisfaction.` : "All dimensions performed at satisfactory levels or above."}`;

  const p3 = `<strong>Overall</strong>, the facility continues to maintain <strong>${perfWord} cleanliness standards</strong>. Continued attention to maintenance protocols and regular evaluations will help sustain and improve these results. Any identified areas for improvement should be prioritized to ensure the highest standards of cleanliness and facility management.`;

  return [p1, p2, p3];
}

// ======================
// GENERATE REPORT
// ======================
function generateReport() {
  if (!selectedOffice) {
    alert("Please select an office");
    return;
  }

  if (!startDate || !endDate) {
    alert("Please select both start and end dates");
    return;
  }

  const officeEvals = evaluations.filter(e => e.officeName === selectedOffice);

  const startTs = new Date(startDate).getTime();
  const endTs = new Date(endDate).getTime() + (24 * 60 * 60 * 1000); // Include end date

  const filteredEvals = officeEvals.filter(e => e.timestamp >= startTs && e.timestamp <= endTs);

  renderStats(filteredEvals);

  if (filteredEvals.length === 0) {
    document.getElementById("report-container").innerHTML = `
      <div class="empty-state">No evaluations found for the selected office and date range.</div>
    `;
    currentReport = null;
    document.getElementById("btn-save-report").disabled = true;
    document.getElementById("reportPreview").style.display = "block";
    return;
  }

  // Calculate averages for each dimension (rating1 -> rating15)
  const dimensionAverages = [];

  DIMENSIONS.forEach(dim => {
    const values = filteredEvals.map(e => e[dim.field]).filter(v => v > 0);
    if (values.length > 0) {
      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      const percentage = (avg / 5) * 100; // Convert 1-5 scale to 0-100%
      const rating = getRatingLabel(percentage);
      dimensionAverages.push({
        dimension: dim.label,
        percentage: percentage.toFixed(1),
        rating
      });
    }
  });

  const overallPct = dimensionAverages.reduce((sum, d) => sum + parseFloat(d.percentage), 0) / dimensionAverages.length;
  const overallRating = getRatingLabel(overallPct);

  // Snapshot ready to be saved
  currentReport = {
    office: selectedOffice,
    startDate,
    endDate,
    respondents: filteredEvals.length,
    avgSatisfaction: overallPct.toFixed(1),
    ratingLabel: overallRating.label,
    ratingClass: overallRating.class,
    dimensionAverages,
    generatedAt: new Date().toISOString()
  };

  // Create official document (with letterhead, narrative, signatures, footer)
  const officialDoc = createOfficialDocument(currentReport);
  document.getElementById("report-container").innerHTML = officialDoc;

  document.getElementById("previewLabel").textContent = `📄 Report Preview — ${selectedOffice}  (${startDate} → ${endDate})`;
  document.getElementById("reportPreview").style.display = "block";
  document.getElementById("reportPreview").scrollIntoView({ behavior: "smooth", block: "start" });

  document.getElementById("btn-save-report").disabled = false;
}

// ======================
// EXPORT PDF (like Admin 1)
// ======================
window.exportPDF = async () => {
  if (document.getElementById("reportPreview").style.display === "none" || !currentReport) {
    alert("Please generate or view a report first.");
    return;
  }

  const officialDoc = createOfficialDocument(currentReport);
  document.getElementById("officialDocument").innerHTML = officialDoc;

  let canvas;
  try {
    canvas = await html2canvas(document.getElementById("csmPage"), {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    });
    var img = canvas.toDataURL("image/png");
  } catch (err) {
    console.error(err);
    alert("⚠ PDF export blocked by the browser.\n\nPlease serve this page over HTTP instead of opening it directly from disk.");
    return;
  }

  const { jsPDF } = window.jspdf;
  const margin = 10;
  const pageWidthMM = 210; // A4 width, kept for a familiar page width
  const usableW = pageWidthMM - margin * 2;
  const scale = usableW / canvas.width;
  const pdfH = canvas.height * scale;
  const pageHeightMM = pdfH + margin * 2; // page height hugs the content instead of a fixed A4 length

  const pdf = new jsPDF({ unit: "mm", format: [pageWidthMM, pageHeightMM] });
  pdf.addImage(img, "PNG", margin, margin, usableW, pdfH);

  const name = (currentReport?.office || "report").replace(/\s+/g, "_");
  pdf.save(`CER_Report_${name}.pdf`);
  
  document.getElementById("officialDocument").innerHTML = "";
};


// ======================
// SAVE REPORT
// ======================
function saveReport() {
  if (!currentReport) return;

  const payload = { ...currentReport, savedOn: Date.now() };
  addDoc(collection(db, SAVED_REPORTS_COLLECTION), payload)
    .then(() => {
      document.getElementById("btn-save-report").disabled = true;
    })
    .catch(err => {
      alert("Could not save report: " + err.message);
    });
}

// ======================
// SAVED REPORTS TABLE
// ======================
function renderSavedReports() {
  const container = document.getElementById("saved-reports-container");
  document.getElementById("saved-reports-count").textContent = `${savedReports.length} report${savedReports.length === 1 ? "" : "s"}`;

  if (savedReports.length === 0) {
    container.innerHTML = `<div class="empty-state">No saved reports yet. Generate a report and hit "Save Report".</div>`;
    return;
  }

  container.innerHTML = `
    <table class="saved-reports-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Office</th>
          <th>Date Range</th>
          <th>Respondents</th>
          <th>Avg Satisfaction</th>
          <th>Rating</th>
          <th>Saved On</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${savedReports.map((r, idx) => `
          <tr>
            <td>${idx + 1}</td>
            <td class="saved-office-name">${r.office}</td>
            <td>${r.startDate} → ${r.endDate}</td>
            <td>${r.respondents}</td>
            <td class="saved-avg">${r.avgSatisfaction}%</td>
            <td><span class="rating-badge ${r.ratingClass}">${r.ratingLabel}</span></td>
            <td>${r.savedOn ? new Date(r.savedOn).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : "-"}</td>
            <td>
              <div class="action-btns">
                <button class="btn-view" data-id="${r.id}">👁 View</button>
                <button class="btn-delete" data-id="${r.id}">🗑</button>
              </div>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  container.querySelectorAll(".btn-view").forEach(btn => {
    btn.addEventListener("click", () => viewSavedReport(btn.dataset.id));
  });
  container.querySelectorAll(".btn-delete").forEach(btn => {
    btn.addEventListener("click", () => deleteSavedReport(btn.dataset.id));
  });
}

function viewSavedReport(id) {
  const r = savedReports.find(sr => sr.id === id);
  if (!r) return;

  const reportStart = new Date(r.startDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const reportEnd = new Date(r.endDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const generatedDate = new Date(r.savedOn).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const officialDoc = createOfficialDocument(r);
  document.getElementById("report-container").innerHTML = officialDoc;

  document.getElementById("previewLabel").textContent = `📄 Report Preview — ${r.office}  (${r.startDate} → ${r.endDate})`;
  document.getElementById("reportPreview").style.display = "block";
  document.getElementById("reportPreview").scrollIntoView({ behavior: "smooth", block: "start" });

  // Reflect the saved report's filters back into the filter bar
  document.getElementById("location-filter").value = r.office;
  document.getElementById("start-date").value = r.startDate;
  document.getElementById("end-date").value = r.endDate;
  selectedOffice = r.office;
  startDate = r.startDate;
  endDate = r.endDate;
  currentReport = r;  // Set to enable PDF export
  document.getElementById("btn-save-report").disabled = true;
}

function deleteSavedReport(id) {
  if (!confirm("Delete this saved report? This cannot be undone.")) return;
  deleteDoc(doc(db, SAVED_REPORTS_COLLECTION, id)).catch(err => {
    alert("Could not delete report: " + err.message);
  });
}
