<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusVoice – Evaluation Mgmt | Admin 2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* --- Evaluation Management: Match Admin 1 Design --- */

  .card {
    background: #fff;
    border-radius: 18px;
    padding: 18px;
    border: 1px solid #e2e8f0;
    margin-bottom: 28px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
  }

  /* Summary Stat Pills */
  .eval-stats {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .eval-stat-pill {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eval-stat-pill span {
    font-size: 18px;
    font-weight: 800;
    color: #0f172a;
  }

  /* Toolbar */
  .submissions-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .toolbar-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    border: none;
    cursor: pointer;
    border-radius: 10px;
    padding: 10px 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-secondary {
    background: #e2e8f0;
    color: #0f172a;
  }

  .btn-secondary:hover {
    background: #cbd5e1;
  }

  /* Tabs */
  .eval-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    border-bottom: 1px solid #e2e8f0;
    flex-wrap: wrap;
  }

  .eval-tab {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #94a3b8;
    padding: 12px 16px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .eval-tab:hover {
    color: #64748b;
  }

  .eval-tab.active {
    color: #0f172a;
    border-bottom-color: #2563eb;
  }

  .tab-count {
    background: #f1f5f9;
    color: #64748b;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }

  .eval-tab.active .tab-count {
    background: #dbeafe;
    color: #2563eb;
  }

  /* Filters */
  .submissions-filter-row {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .search-input-wrap {
    flex: 1;
    min-width: 250px;
    display: flex;
    align-items: center;
    gap: 8px;
    height: 46px;
    background: #f8fafc;
    border: 1px solid #dbe4ee;
    border-radius: 12px;
    padding: 0 14px;
  }

  .search-input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #0f172a;
  }

  .office-filter-select {
    height: 46px;
    background: #f8fafc;
    border: 1px solid #dbe4ee;
    border-radius: 12px;
    padding: 0 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #0f172a;
    min-width: 180px;
    -webkit-appearance: none;
    appearance: none;
  }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .submissions-table {
    width: 100%;
    border-collapse: collapse;
  }

  .submissions-table th {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #94a3b8;
    padding: 14px 10px;
    border-bottom: 1px solid #e2e8f0;
    white-space: nowrap;
  }

  .submissions-table td {
    padding: 14px 10px;
    border-bottom: 1px solid #edf2f7;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #334155;
    vertical-align: middle;
  }

  .submissions-table tbody tr:last-child td {
    border-bottom: none;
  }

  .row-index {
    color: #94a3b8;
    font-size: 12px;
  }

  .rating-q-cell {
    text-align: center;
  }

  .empty-row td {
    text-align: center;
    color: #94a3b8;
    padding: 40px 0 !important;
  }

  /* Status Badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
  }

  .status-badge.pending {
    background: #fef3c7;
    color: #b45309;
  }

  .status-badge.no_action {
    background: #e0e7ff;
    color: #4338ca;
  }

  .status-badge.resolved {
    background: #dcfce7;
    color: #166534;
  }

  /* Action Links */
  .btn-view {
    background: none;
    border: none;
    color: #2563eb;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    margin-right: 14px;
  }

  .btn-view:hover {
    text-decoration: underline;
  }

  .btn-edit {
    background: none;
    border: none;
    color: #c2410c;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }

  .btn-edit:hover {
    text-decoration: underline;
  }

  /* Modals */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 27, 50, 0.55);
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: 20px;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal-content {
    background: #ffffff;
    border-radius: 18px;
    width: 100%;
    max-width: 480px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(15, 27, 50, 0.15);
    max-height: 85vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal-content h3 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    margin: 0 0 20px 0;
  }

  .modal-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f1f5f9;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #334155;
    gap: 12px;
  }

  .modal-row:last-of-type {
    border-bottom: none;
  }

  .modal-row span:first-child {
    color: #94a3b8;
    font-weight: 600;
    min-width: 120px;
  }

  .modal-row span:last-child {
    word-break: break-word;
    text-align: right;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  /* Edit Form Fields */
  .edit-field {
    margin-bottom: 16px;
  }

  .edit-field label {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .edit-field select {
    width: 100%;
    box-sizing: border-box;
    height: 44px;
    border: 1px solid #dbe4ee;
    border-radius: 10px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #0f172a;
    background: #f8fafc;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn-primary {
    flex: 1;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-primary:hover:not(:disabled) {
    background: #1d4ed8;
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: default;
  }

  .btn-secondary {
    flex: 1;
    background: #e2e8f0;
    color: #0f172a;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-secondary:hover {
    background: #cbd5e1;
  }

  /* --- Evidence column & gallery --- */
  .evidence-cell {
    cursor: pointer;
  }

  .evidence-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    color: #334155;
    white-space: nowrap;
  }

  .evidence-badge:hover {
    background: #e2e8f0;
  }

  .evidence-badge.empty {
    color: #94a3b8;
    cursor: default;
  }

  .evidence-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    margin-top: 4px;
  }

  .evidence-gallery-item {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #e2e8f0;
    background: #0f172a;
    display: block;
    text-decoration: none;
  }

  .evidence-gallery-item img,
  .evidence-gallery-item video {
    width: 100%;
    height: 90px;
    object-fit: cover;
    display: block;
  }

  .evidence-gallery-item .evidence-type-tag {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(15, 23, 42, 0.75);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .evidence-empty-note {
    font-size: 13px;
    color: #94a3b8;
  }

  @media (max-width: 768px) {
    .submissions-filter-row {
      flex-direction: column;
    }

    .search-input-wrap,
    .office-filter-select {
      width: 100%;
      min-width: unset;
    }

    .modal-content {
      padding: 20px;
    }
  }
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main fade-in">
    <div id="topbar-mount"></div>

    <div style="margin-top: 28px;">
      <!-- Summary Stats -->
      <div class="eval-stats">
        <div class="eval-stat-pill">📋 Total <span id="stat-total">0</span></div>
        <div class="eval-stat-pill">🏢 Offices <span id="stat-offices">0</span></div>
        <div class="eval-stat-pill">⏳ Pending <span id="stat-pending">0</span></div>
        <div class="eval-stat-pill">🙅 No Action <span id="stat-no-action">0</span></div>
        <div class="eval-stat-pill">✅ Resolved <span id="stat-resolved">0</span></div>
      </div>

      <div class="card">
        <!-- Header & Actions -->
        <div class="submissions-toolbar">
          <div class="card-title">Evaluation Submissions</div>
          <div class="toolbar-actions">
            <button class="btn btn-secondary" id="btn-refresh">🔄 Refresh</button>
            <button class="btn btn-secondary" id="btn-export">⬇️ Export CSV</button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="eval-tabs" id="eval-tabs">
          <button class="eval-tab active" data-tab="recent">Recent <span class="tab-count" id="tab-count-recent">0</span></button>
          <button class="eval-tab" data-tab="pending">Pending <span class="tab-count" id="tab-count-pending">0</span></button>
          <button class="eval-tab" data-tab="no_action">No Action Required <span class="tab-count" id="tab-count-no_action">0</span></button>
          <button class="eval-tab" data-tab="resolved">Resolved <span class="tab-count" id="tab-count-resolved">0</span></button>
        </div>

        <!-- Filters -->
        <div class="submissions-filter-row">
          <div class="search-input-wrap">
            <span>🔍</span>
            <input type="text" id="search-input" placeholder="Search by office or comments…">
          </div>
          <select class="office-filter-select" id="office-filter">
            <option value="">All Offices</option>
          </select>
        </div>

        <!-- Table -->
        <div class="table-wrap">
          <table class="submissions-table">
            <thead>
              <tr id="submissions-thead-row">
                <!-- #, Office, Q1..Q15, Comments, Evidence, Status, Date, Action
                     are built dynamically in JS so the number of rating
                     columns (TOTAL_RATING_QUESTIONS) only needs to be
                     changed in one place. -->
              </tr>
            </thead>
            <tbody id="submissions-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- VIEW DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-content">
    <h3>📋 Submission Details</h3>
    <div id="detail-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="detail-modal-close">Close</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-content">
    <h3>✏️ Edit Submission</h3>
    <div id="edit-modal-meta" style="margin-bottom: 18px;"></div>
    <div class="edit-field">
      <label for="edit-status-select">Status</label>
      <select id="edit-status-select">
        <option value="pending">Pending</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="edit-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="edit-modal-save">Save Changes</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Build Sidebar & Topbar
document.getElementById("sidebar-mount").innerHTML =
  buildSidebar("admin2", "eval-mgmt");

document.getElementById("topbar-mount").innerHTML =
  buildTopbar("Evaluation Management", "admin2");

// ======================
// FIRESTORE COLLECTION NAME / SCHEMA CONSTANTS
// ======================
// Confirmed from the actual Firestore console: the offices collection
// is named "office-names" (NOT "offices").
const OFFICES_COLLECTION = "office-names";

// Confirmed from the actual Firestore console: cleanliness_evaluations
// documents store 15 rating fields (rating1 ... rating15), not just
// rating1-4. Every place that needs to loop over the rating questions
// (table headers, row cells, detail modal, CSV export) drives off this
// constant so there's only one place to change if it's ever adjusted.
const TOTAL_RATING_QUESTIONS = 15;

// Evaluations with an average rating at or above this threshold (out of
// 5, matching Admin 3's eval-mgmt page) are treated as positive feedback
// and auto-classified as "No Action Required" instead of "Pending", so
// admins only need to look at genuinely low-rated submissions in the
// Pending tab. Adjust this single constant to tune the cutoff.
const LOW_RATING_THRESHOLD = 3;

// Display labels/icons for each status value, used across the table,
// stat pills, detail modal, and CSV export.
const STATUS_META = {
  pending: { label: "Pending", icon: "⏳" },
  no_action: { label: "No Action Required", icon: "🙅" },
  resolved: { label: "Resolved", icon: "✅" }
};

// ======================
// STATE
// ======================
let evaluations = [];
let offices = {};
let searchTerm = "";
let officeFilter = "";
let currentTab = "recent";
let editingId = null;

// ======================
// HELPERS
// ======================
function makeCode(officeName, id) {
  const prefix = (officeName || "GEN")
    .toUpperCase()
    .replace(/[^A-Z0-9]/g, "")
    .slice(0, 4) || "GEN";
  const suffix = id.slice(-6).toUpperCase();
  return `${prefix}-${suffix}`;
}

// Averages rating1 ... ratingN (out of 5) for one record.
function evalAvg(record) {
  let sum = 0;
  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    sum += record["rating" + i];
  }
  return sum / TOTAL_RATING_QUESTIONS;
}

// Normalizes evidence into a consistent array of { url, type }.
// Supports the current multi-file Android schema (evidenceUrls[] /
// evidenceTypes[]), the earlier single-file schema (evidenceUrl /
// evidenceType), and the very first schema (fileUrl only, type unknown —
// guessed from the file extension).
function parseEvidence(data) {
  const items = [];

  if (Array.isArray(data.evidenceUrls) && data.evidenceUrls.length) {
    const urls = data.evidenceUrls;
    const types = Array.isArray(data.evidenceTypes) ? data.evidenceTypes : [];
    urls.forEach((url, i) => {
      if (url) items.push({ url, type: types[i] === "video" ? "video" : "image" });
    });
    return items;
  }

  if (data.evidenceUrl) {
    items.push({ url: data.evidenceUrl, type: data.evidenceType === "video" ? "video" : "image" });
    return items;
  }

  if (data.fileUrl) {
    const isVideo = /\.(mp4|mov|webm|mkv|avi)(\?|$)/i.test(data.fileUrl);
    items.push({ url: data.fileUrl, type: isVideo ? "video" : "image" });
    return items;
  }

  return items;
}

// Normalizes whatever is stored under a record's status into "pending",
// "no_action", or "resolved" (mirrors Admin 3's eval-mgmt page).
//
// Records with no status field at all — which today is every record the
// app writes, since it never sets a status field on submit — are
// auto-classified from their average rating instead of defaulting to
// "pending":
//   - avgRating < LOW_RATING_THRESHOLD  -> "pending"    (needs attention)
//   - avgRating >= LOW_RATING_THRESHOLD -> "no_action"   (positive feedback)
// Once an admin explicitly sets a status via the Edit modal, that saved
// value is always respected and skips the auto-classification.
function parseEvalStatus(data, avgRating) {
  const stored = (data.status || "").toString().toLowerCase();
  if (stored === "resolved" || stored === "pending" || stored === "no_action") {
    return stored;
  }
  return avgRating < LOW_RATING_THRESHOLD ? "pending" : "no_action";
}

// ======================
// BUILD TABLE HEADER (# / Office / Q1..Q15 / Comments / Evidence / Status / Date / Action)
// ======================
function renderTableHeader() {
  const headRow = document.getElementById("submissions-thead-row");

  let questionHeaders = "";
  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    questionHeaders += `<th>Q${i}</th>`;
  }

  headRow.innerHTML = `
    <th>#</th>
    <th>Office</th>
    ${questionHeaders}
    <th>Comments</th>
    <th>Evidence</th>
    <th>Status</th>
    <th>Date</th>
    <th id="action-col-header">Action</th>
  `;
}
renderTableHeader();

// ======================
// LOAD OFFICES
// ======================
const officesCollectionRef = collection(db, OFFICES_COLLECTION);

onSnapshot(officesCollectionRef, (snapshot) => {
  offices = {};
  snapshot.forEach((doc) => {
    const data = doc.data();
    offices[doc.id] = data.name || data.officeName || doc.id;
  });

  populateOfficeFilter();
  renderSubmissions();
});

// ======================
// LOAD EVALUATIONS (real-time — fires for every new Android submission too)
// ======================
const evalCollectionRef = collection(db, "cleanliness_evaluations");
const evalQuery = query(evalCollectionRef, orderBy("timestamp", "desc"));

onSnapshot(evalQuery, (snapshot) => {
  evaluations = [];
  snapshot.forEach((doc) => {
    const data = doc.data();

    const record = {
      id: doc.id,
      officeName: data.officeName || "Unknown",
      comments: data.comments || "",
      timestamp: Number(data.timestamp) || 0,
      evidence: parseEvidence(data)
    };

    // Pull rating1 ... rating15 (matches the actual documents in
    // Firestore, which go up to rating15, not rating4).
    for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
      record["rating" + i] = Number(data["rating" + i]) || 0;
    }

    record.avgRating = evalAvg(record);
    record.status = parseEvalStatus(data, record.avgRating);

    evaluations.push(record);
  });

  evaluations.forEach(ev => {
    ev.code = makeCode(ev.officeName, ev.id);
  });

  renderSubmissions();
});

// ======================
// TABS
// ======================
document.getElementById("eval-tabs").addEventListener("click", (ev) => {
  const btn = ev.target.closest(".eval-tab");
  if (!btn) return;
  currentTab = btn.getAttribute("data-tab");
  document.querySelectorAll(".eval-tab").forEach(t => t.classList.toggle("active", t === btn));
  renderSubmissions();
});

// ======================
// RENDER
// ======================
function populateOfficeFilter() {
  const select = document.getElementById("office-filter");
  const currentValue = select.value;

  const options = ['<option value="">All Offices</option>']
    .concat(Object.values(offices).map(name => `<option value="${name}">${name}</option>`));

  select.innerHTML = options.join("");
  select.value = currentValue;
}

function getFilteredSubmissions() {
  const term = searchTerm.trim().toLowerCase();

  return evaluations
    .filter(e => currentTab === "recent" ? true : e.status === currentTab)
    .filter(e => !officeFilter || e.officeName === officeFilter)
    .filter(e => {
      if (!term) return true;
      return (
        e.officeName.toLowerCase().includes(term) ||
        e.comments.toLowerCase().includes(term)
      );
    })
    .sort((a, b) => b.timestamp - a.timestamp);
}

// Builds the Q1..Q15 <td> cells for one evaluation row.
function ratingCellsHtml(e) {
  let html = "";
  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    html += `<td class="rating-q-cell">${e["rating" + i]}</td>`;
  }
  return html;
}

// Builds the Evidence <td> cell — a clickable badge summarizing image
// and video counts, or "No evidence" if the record has none. Clicking
// it opens the same detail modal as the View action.
function evidenceCellHtml(e) {
  const imgCount = e.evidence.filter(item => item.type === "image").length;
  const vidCount = e.evidence.filter(item => item.type === "video").length;

  if (imgCount === 0 && vidCount === 0) {
    return `<span class="evidence-badge empty">No evidence</span>`;
  }

  const parts = [];
  if (imgCount) parts.push(`📷 ${imgCount}`);
  if (vidCount) parts.push(`🎥 ${vidCount}`);

  return `<span class="evidence-badge evidence-cell" data-eval-id="${e.id}">${parts.join("  ")}</span>`;
}

function renderSubmissions() {
  const filtered = getFilteredSubmissions();

  // Update stats
  document.getElementById("stat-total").textContent = evaluations.length;
  const distinctOffices = new Set(evaluations.map(e => e.officeName));
  document.getElementById("stat-offices").textContent = distinctOffices.size;

  const pendingCount = evaluations.filter(e => e.status === "pending").length;
  const noActionCount = evaluations.filter(e => e.status === "no_action").length;
  const resolvedCount = evaluations.filter(e => e.status === "resolved").length;
  document.getElementById("stat-pending").textContent = pendingCount;
  document.getElementById("stat-no-action").textContent = noActionCount;
  document.getElementById("stat-resolved").textContent = resolvedCount;

  document.getElementById("tab-count-recent").textContent = evaluations.length;
  document.getElementById("tab-count-pending").textContent = pendingCount;
  document.getElementById("tab-count-no_action").textContent = noActionCount;
  document.getElementById("tab-count-resolved").textContent = resolvedCount;

  const tbody = document.getElementById("submissions-tbody");
  const showActionColumn = currentTab !== "recent";
  const actionHeader = document.getElementById("action-col-header");
  if (actionHeader) actionHeader.style.display = showActionColumn ? "" : "none";

  // #, Office, Q1..Q15, Comments, Evidence, Status, Date [, Action]
  const colCount = 2 + TOTAL_RATING_QUESTIONS + 4 + (showActionColumn ? 1 : 0);

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${colCount}">No submissions found.</td></tr>`;
    return;
  }

  // Edit is only available from the Pending and Resolved tabs — records
  // under No Action Required only get a View button, matching Admin 3.
  const showEditButton = showActionColumn && currentTab !== "no_action";

  tbody.innerHTML = filtered.map((e, i) => {
    const date = e.timestamp ? new Date(e.timestamp).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "-";
    const meta = STATUS_META[e.status] || STATUS_META.pending;
    const actionCell = showActionColumn ? `
        <td>
          <button class="btn-view" data-eval-id="${e.id}">View</button>
          ${showEditButton ? `<button class="btn-edit" data-eval-id="${e.id}">Edit</button>` : ""}
        </td>` : "";
    return `
      <tr>
        <td class="row-index">${i + 1}</td>
        <td>${e.officeName}</td>
        ${ratingCellsHtml(e)}
        <td>${e.comments || "-"}</td>
        <td>${evidenceCellHtml(e)}</td>
        <td><span class="status-badge ${e.status}">${meta.icon} ${meta.label}</span></td>
        <td>${date}</td>${actionCell}
      </tr>
    `;
  }).join("");

  tbody.querySelectorAll(".btn-view").forEach(btn => {
    btn.addEventListener("click", () => openDetailModal(btn.getAttribute("data-eval-id")));
  });
  tbody.querySelectorAll(".btn-edit").forEach(btn => {
    btn.addEventListener("click", () => openEditModal(btn.getAttribute("data-eval-id")));
  });
  tbody.querySelectorAll(".evidence-cell").forEach(badge => {
    badge.addEventListener("click", () => openDetailModal(badge.getAttribute("data-eval-id")));
  });
}

// ======================
// SEARCH / FILTER
// ======================
document.getElementById("search-input").addEventListener("input", (ev) => {
  searchTerm = ev.target.value;
  renderSubmissions();
});

document.getElementById("office-filter").addEventListener("change", (ev) => {
  officeFilter = ev.target.value;
  renderSubmissions();
});

// ======================
// REFRESH
// ======================
document.getElementById("btn-refresh").addEventListener("click", () => {
  const btn = document.getElementById("btn-refresh");
  const original = btn.textContent;
  btn.textContent = "🔄 Refreshing...";
  btn.disabled = true;
  renderSubmissions();
  setTimeout(() => {
    btn.textContent = original;
    btn.disabled = false;
  }, 500);
});

// ======================
// EXPORT CSV
// ======================
document.getElementById("btn-export").addEventListener("click", () => {
  const filtered = getFilteredSubmissions();

  if (filtered.length === 0) {
    alert("No submissions to export.");
    return;
  }

  const questionHeaders = [];
  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    questionHeaders.push("Q" + i);
  }

  const header = ["#", "Office", ...questionHeaders, "Avg", "Comments", "Image URLs", "Video URLs", "Status", "Date"];

  const rows = filtered.map((e, i) => {
    const date = e.timestamp ? new Date(e.timestamp).toLocaleDateString() : "-";
    const comments = `"${(e.comments || "").replace(/"/g, '""')}"`;
    const status = (STATUS_META[e.status] || STATUS_META.pending).label;

    const ratingValues = [];
    for (let q = 1; q <= TOTAL_RATING_QUESTIONS; q++) {
      ratingValues.push(e["rating" + q]);
    }

    const imageUrls = `"${e.evidence.filter(item => item.type === "image").map(item => item.url).join(" | ")}"`;
    const videoUrls = `"${e.evidence.filter(item => item.type === "video").map(item => item.url).join(" | ")}"`;

    return [i + 1, e.officeName, ...ratingValues, e.avgRating.toFixed(1), comments, imageUrls, videoUrls, status, date].join(",");
  });

  const csvContent = [header.join(","), ...rows].join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = `cleanliness-submissions-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});

// ======================
// VIEW DETAIL MODAL
// ======================
const detailModal = document.getElementById("detail-modal");
const detailModalBody = document.getElementById("detail-modal-body");

function openDetailModal(evalId) {
  const e = evaluations.find(item => item.id === evalId);
  if (!e) return;

  const date = e.timestamp ? new Date(e.timestamp).toLocaleString() : "-";
  const statusLabel = (STATUS_META[e.status] || STATUS_META.pending).label;

  let questionRows = "";
  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    questionRows += `<div class="modal-row"><span>Q${i}</span><span>${e["rating" + i]}</span></div>`;
  }

  detailModalBody.innerHTML = `
    <div class="modal-row"><span>Office</span><span>${e.officeName}</span></div>
    <div class="modal-row"><span>Avg Rating</span><span>${e.avgRating.toFixed(1)} / 5</span></div>
    ${questionRows}
    <div class="modal-row"><span>Comments</span><span>${e.comments || "-"}</span></div>
    <div class="modal-row"><span>Status</span><span>${statusLabel}</span></div>
    <div class="modal-row"><span>Submitted</span><span>${date}</span></div>
    <div class="modal-row" style="display:block;">
      <span style="display:block; margin-bottom:8px;">Evidence</span>
      ${evidenceGalleryHtml(e)}
    </div>
  `;

  detailModal.classList.add("open");
}

// Renders the thumbnail grid inside the detail modal from a record's
// normalized evidence array. Images use <img>, videos use a muted
// <video> frame with a "Video" tag; both are wrapped in a link that
// opens the full Cloudinary URL in a new tab.
function evidenceGalleryHtml(e) {
  if (!e.evidence.length) {
    return `<div class="evidence-empty-note">No images or videos were attached.</div>`;
  }

  const items = e.evidence.map(item => {
    if (item.type === "video") {
      return `
        <a class="evidence-gallery-item" href="${item.url}" target="_blank" rel="noopener">
          <video src="${item.url}" muted></video>
          <span class="evidence-type-tag">Video</span>
        </a>`;
    }
    return `
      <a class="evidence-gallery-item" href="${item.url}" target="_blank" rel="noopener">
        <img src="${item.url}" alt="Evidence" loading="lazy">
        <span class="evidence-type-tag">Image</span>
      </a>`;
  }).join("");

  return `<div class="evidence-gallery">${items}</div>`;
}

document.getElementById("detail-modal-close").addEventListener("click", () => {
  detailModal.classList.remove("open");
});
detailModal.addEventListener("click", (ev) => {
  if (ev.target === detailModal) detailModal.classList.remove("open");
});

// ======================
// EDIT MODAL
// ======================
const editModal = document.getElementById("edit-modal");
const editModalMeta = document.getElementById("edit-modal-meta");
const editStatusSelect = document.getElementById("edit-status-select");
const editSaveBtn = document.getElementById("edit-modal-save");

function openEditModal(evalId) {
  const e = evaluations.find(item => item.id === evalId);
  if (!e) return;

  // Edit is not reachable from the No Action Required tab; guard here
  // too in case this is ever called from elsewhere.
  if (e.status === "no_action") return;

  const date = e.timestamp ? new Date(e.timestamp).toLocaleString() : "-";

  editingId = evalId;
  editModalMeta.innerHTML = `
    <div class="modal-row"><span>Office</span><span>${e.officeName}</span></div>
    <div class="modal-row"><span>ID</span><span>${e.id}</span></div>
    <div class="modal-row"><span>Avg Rating</span><span>${e.avgRating.toFixed(1)} / 5</span></div>
    <div class="modal-row"><span>Date</span><span>${date}</span></div>
  `;
  editStatusSelect.value = e.status;

  editModal.classList.add("open");
}

document.getElementById("edit-modal-cancel").addEventListener("click", () => {
  editModal.classList.remove("open");
  editingId = null;
});
editModal.addEventListener("click", (ev) => {
  if (ev.target === editModal) {
    editModal.classList.remove("open");
    editingId = null;
  }
});

editSaveBtn.addEventListener("click", async () => {
  if (!editingId) return;

  const newStatus = editStatusSelect.value;

  editSaveBtn.disabled = true;
  editSaveBtn.textContent = "Saving...";

  try {
    await updateDoc(doc(db, "cleanliness_evaluations", editingId), {
      status: newStatus
    });
    editModal.classList.remove("open");
    editingId = null;
  } catch (err) {
    alert("Failed to save changes. Please try again.");
    console.error(err);
  } finally {
    editSaveBtn.disabled = false;
    editSaveBtn.textContent = "Save Changes";
  }
});

</script>
</body>
</html>
