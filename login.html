<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusVoice – Login | ISUFST-SEC</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1120; --surface: #111827; --surface2: #1a2537; --border: #1e2d45;
    --accent1: #2563eb; --accent2: #06b6d4; --accent3: #8b5cf6;
    --text: #f1f5f9; --muted: #64748b; --label: #94a3b8;
    --red: #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(ellipse 600px 400px at 20% 30%, rgba(37,99,235,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 80% 70%, rgba(139,92,246,0.10) 0%, transparent 70%);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 420px;
    max-width: 95vw;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .login-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .brand {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent1));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.03em;
  }
  .login-logo .sub { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
  .role-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 28px; }
  .role-tab {
    padding: 10px; text-align: center; border-radius: 10px;
    border: 1px solid var(--border); cursor: pointer; font-size: 0.82rem;
    font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.04em;
    transition: all 0.2s; color: var(--muted); background: transparent;
  }
  .role-tab.active-a1 { background: rgba(37,99,235,0.18); border-color: var(--accent1); color: #60a5fa; }
  .role-tab.active-a2 { background: rgba(139,92,246,0.18); border-color: var(--accent3); color: #a78bfa; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--label); margin-bottom: 7px; letter-spacing: 0.04em; text-transform: uppercase; }
  .form-group input {
    width: 100%; padding: 11px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 9px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.93rem; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent1); }
  .btn-login {
    width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700; letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--accent1), #1d4ed8);
    color: white; margin-top: 8px; transition: opacity 0.2s, transform 0.15s;
  }
  .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
  .login-hint { text-align: center; font-size: 0.76rem; color: var(--muted); margin-top: 18px; }
  .login-hint span { color: var(--label); }
  .login-error {
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
    color: #f87171; border-radius: 8px; padding: 9px 14px;
    font-size: 0.8rem; margin-top: 12px; display: none; text-align: center;
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="brand">CampusVoice</div>
    <div class="sub">ISUFST – San Enrique Campus</div>
  </div>
  <div class="role-tabs">
    <div class="role-tab active-a1" id="tab-a1" onclick="selectRole('admin1')">⚙️ Admin 1</div>
    <div class="role-tab" id="tab-a2" onclick="selectRole('admin2')">🏛️ Admin 2</div>
  </div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="login-user" placeholder="Enter username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
  </div>
  <button class="btn-login" onclick="doLogin()">Sign In to Dashboard</button>
  <div class="login-error" id="login-error">❌ Invalid credentials. Please try again.</div>
  <p class="login-hint">Demo: <span>admin1 / admin123</span> &nbsp;|&nbsp; <span>admin2 / admin456</span></p>
</div>

<script>
  let selectedRole = 'admin1';

  function selectRole(r) {
    selectedRole = r;
    document.getElementById('tab-a1').className = 'role-tab' + (r === 'admin1' ? ' active-a1' : '');
    document.getElementById('tab-a2').className = 'role-tab' + (r === 'admin2' ? ' active-a2' : '');
    document.getElementById('login-user').value = r === 'admin1' ? 'admin1' : 'admin2';
    document.getElementById('login-pass').value = r === 'admin1' ? 'admin123' : 'admin456';
    document.getElementById('login-error').style.display = 'none';
  }

  function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    if (u === 'admin1' && p === 'admin123') {
      window.location.href = 'admin1-dashboard.html';
    } else if (u === 'admin2' && p === 'admin456') {
      window.location.href = 'admin2-dashboard.html';
    } else {
      errEl.style.display = 'block';
    }
  }

  // Pre-fill
  selectRole('admin1');
</script>
</body>
</html>
