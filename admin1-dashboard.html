<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusVoice – Dashboard | Admin 1</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
/* --- Admin 2 Design Applied --- */
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1.6fr;
  gap: 20px;
  margin-bottom: 24px;
}

.card-header-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.badge-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(37,99,235,0.12);
  color:#3b82f6;
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:13px;
  padding:6px 14px;
  border-radius:999px;
  border:1px solid rgba(59,130,246,0.35);
  white-space:nowrap;
}

/* Line chart styling */
.line-chart-wrap{
  margin-top:12px;
}
#line-chart-svg{
  width:100%;
  height:220px;
  display:block;
}

/* Bar chart styling */
.bar-chart-wrap{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:48px;
  flex-wrap:wrap;
  padding:24px 0;
  min-height:350px;
  position:relative;
}
.bar-chart-wrap svg{
  flex-shrink:0;
  width:100%;
  height:320px;
}
.bar-legend{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  color:#1e293b;
}
.legend-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  flex-shrink:0;
}

/* Donut chart styling */
.donut-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:48px;
  flex-wrap:wrap;
  padding:12px 0;
}
.donut-wrap svg{
  flex-shrink:0;
}
.donut-legend{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* Code Utilization legend positioned on right */
#codeUtilWrap {
  order: 1;
}
#code-pie-legend {
  order: 2;
}

/* Code Utilization pie chart */
.pie-wrap{
  position:relative;
}
.pie-slice{
  cursor:pointer;
  transition:opacity .15s ease, transform .15s ease;
  transform-origin:60px 60px;
}
.pie-slice:hover{
  opacity:0.88;
}

.pie-tooltip{
  position:absolute;
  pointer-events:none;
  background:#0f172a;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  line-height:1.4;
  padding:9px 13px;
  border-radius:10px;
  box-shadow:0 10px 24px rgba(15,23,42,0.28);
  opacity:0;
  transform:translate(-50%,-125%);
  transition:opacity .12s ease;
  z-index:20;
  white-space:nowrap;
}
.pie-tooltip.show{
  opacity:1;
}
.pie-tooltip .tt-title{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:13px;
  margin-bottom:3px;
}
.pie-tooltip .tt-sub{
  color:#cbd5e1;
  font-size:11px;
}

/* Evaluation Status card */
.eval-status-card{
  margin-top:24px;
}
.eval-status-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:16px;
}
.eval-filters{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin-top:14px;
}
.eval-filter-group{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:180px;
}
.eval-filter-label{
  font-family:'DM Sans',sans-serif;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:#94a3b8;
}
.eval-filter-select{
  appearance:none;
  -webkit-appearance:none;
  background:#fff;
  border:1px solid #e2e8f0;
  border-radius:10px;
  padding:10px 36px 10px 14px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  color:#1e293b;
  cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%2394a3b8' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat:no-repeat;
  background-position:right 12px center;
  padding-right:36px;
}
.eval-filter-select:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.12);
}

.status-rows{
  margin-top:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
}
.status-row{
  display:grid;
  grid-template-columns:130px 1fr 36px;
  align-items:center;
  gap:14px;
}
.status-label-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}
.status-dot{
  width:9px;
  height:9px;
  border-radius:50%;
  flex-shrink:0;
}
.status-label{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:14px;
}
.status-bar-track{
  background:#e9edf3;
  border-radius:999px;
  height:10px;
  width:100%;
  overflow:hidden;
}
.status-bar-fill{
  height:100%;
  border-radius:999px;
  width:0%;
  transition:width 0.4s ease;
}
.status-count{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:15px;
  color:#0f172a;
  text-align:right;
}

@media (max-width: 1024px) {
  .charts-grid {
    grid-template-columns: 1fr 1.4fr;
  }
}

@media (max-width: 768px) {
  .charts-grid {
    grid-template-columns: 1fr;
  }
  #line-chart-svg { height:180px; }
  .bar-chart-wrap {
    flex-direction:column;
    gap:20px;
    min-height:300px;
  }
  .bar-chart-wrap svg {
    height:280px;
  }
  .donut-wrap {
    flex-direction: column;
  }
}
</style>
</head>
<body>

    <div class="stat-grid">

      <!-- CODE UTILIZATION CHART -->

          <div class="card-title">Code Utilization <span class="card-sub">— Used vs Unused</span></div>

        <div class="donut-wrap">

  </main>

<script src="shared.js"></script>
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAnalytics }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
import { getDatabase, ref, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",authDomain:"kristal-adb78.firebaseapp.com",
  databaseURL:"https://kristal-adb78-default-rtdb.firebaseio.com",projectId:"kristal-adb78",
  storageBucket:"kristal-adb78.firebasestorage.app",messagingSenderId:"1016283938031",
  appId:"1:1016283938031:web:54c4d13409d9784ad7af1a",measurementId:"G-LK8D1CBQ2J"
};
const app      = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const database  = getDatabase(app);

document.getElementById('sidebar-mount').innerHTML = buildSidebar('admin1','dashboard');
document.getElementById('topbar-mount').innerHTML  = buildTopbar('Dashboard','admin1');

const evaluationRef = ref(database,"services/evaluations");
const officeRef     = ref(database,"services/offices");
const codeRef       = ref(database,"services/transaction_code/offices_name");

let offices   = {};
let allCodes  = {};
let allEvaluations = [];

const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function avgScore(item) {
  let s=0,c=0;
  for(let x=1;x<=8;x++){
    const v=parseFloat(item["sq"+x]??item["sqd"+x]);
    if(!isNaN(v)){s+=v;c++;}
  }
  return c?s/c:0;
}

// ── Listen to transaction codes ──
onValue(codeRef,(snapshot)=>{
  const raw = snapshot.val() || {};
  allCodes = {};
  Object.keys(raw).forEach(office => {
    Object.keys(raw[office]).forEach(key => {
      allCodes[key] = { office, ...raw[office][key] };
    });
  });
  renderCodeUtilization();
});

onValue(officeRef,(snapshot)=>{
  const data = snapshot.val();
  offices={};
  if(!data){
    document.getElementById("officeCount").textContent=0;
    renderCodeUtilization();
    return;
  }
  Object.keys(data).forEach(key=>{
    const name=data[key].name;
    offices[name]={total:0,count:0};
  });
  const total=Object.keys(offices).length;
  document.getElementById("officeCount").textContent=total;
  renderCodeUtilization();
});

onValue(evaluationRef,(snapshot)=>{
  const data=snapshot.val();
  const today=new Date();
  let daily=0,weekly=0,monthly=0;
  Object.keys(offices).forEach(o=>{offices[o].total=0;offices[o].count=0;});
  let total=0,pos=0,neu=0,neg=0;
  allEvaluations = [];
  
  if(data){
    Object.keys(data).forEach(key=>{
      const item=data[key];
      allEvaluations.push(item);
      total++;
      const diff=(today-new Date(item.date))/(1000*60*60*24);
      if(diff<=1)daily++;if(diff<=7)weekly++;if(diff<=30)monthly++;
      const avg=avgScore(item);
      if(avg>=4)pos++;else if(avg>=3)neu++;else neg++;
      if(offices[item.office]){offices[item.office].total+=avg;offices[item.office].count++;}
    });
  }
  document.getElementById("dailySubmissions").textContent=daily;
  document.getElementById("weeklySubmissions").textContent=weekly;
  document.getElementById("monthlySubmissions").textContent=monthly;

  renderCodeUtilization();
  renderBarChart(total, pos, neu, neg);
  renderLineChart();
});

/* ── Polar-to-cartesian helper for pie wedges. Angle is measured in degrees
   from the top (12 o'clock), increasing clockwise — matches how people read
   a pie chart, unlike the default SVG angle convention. ── */
function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = (angleDeg) * Math.PI / 180;
  return {
    x: cx + r * Math.sin(rad),
    y: cy - r * Math.cos(rad)
  };
}

function describeSlice(cx, cy, r, startAngle, endAngle) {
  const startPt = polarToCartesian(cx, cy, r, startAngle);
  const endPt   = polarToCartesian(cx, cy, r, endAngle);
  const largeArcFlag = (endAngle - startAngle) > 180 ? 1 : 0;
  return [
    "M", cx, cy,
    "L", startPt.x, startPt.y,
    "A", r, r, 0, largeArcFlag, 1, endPt.x, endPt.y,
    "Z"
  ].join(" ");
}

function renderCodeUtilization(){
  const svg     = document.getElementById("code-pie-svg");
  const legend  = document.getElementById("code-pie-legend");
  const tooltip = document.getElementById("code-pie-tooltip");
  const wrap    = document.getElementById("codeUtilWrap");

  svg.innerHTML = "";
  tooltip.classList.remove("show");

  const totalCodes  = Object.values(allCodes).length;
  const usedCodes   = Object.values(allCodes).filter(c => c.status === "used").length;
  const unusedCodes = totalCodes - usedCodes;

  document.getElementById("codeCountBadge").textContent = totalCodes;

  if (totalCodes === 0) {
    legend.innerHTML = `<div class="legend-item">No codes generated yet</div>`;
    return;
  }

  const segments = [
    { key: "used",   label: "Used",   color: "#2563eb", count: usedCodes },
    { key: "unused", label: "Unused", color: "#cbd5e1", count: unusedCodes }
  ].filter(seg => seg.count > 0);

  const cx = 60, cy = 60, r = 50;
  let startAngle = 0;

  segments.forEach(seg => {
    const pct = (seg.count / totalCodes) * 100;
    const angle = (seg.count / totalCodes) * 360;
    const endAngle = startAngle + angle;

    // A single 100% slice can't be drawn as one arc (start === end point),
    // so draw it as a full circle instead.
    let slice;
    if (segments.length === 1) {
      slice = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      slice.setAttribute("cx", cx);
      slice.setAttribute("cy", cy);
      slice.setAttribute("r", r);
    } else {
      slice = document.createElementNS("http://www.w3.org/2000/svg", "path");
      slice.setAttribute("d", describeSlice(cx, cy, r, startAngle, endAngle));
    }

    slice.setAttribute("fill", seg.color);
    slice.setAttribute("class", "pie-slice");
    slice.setAttribute("stroke", "#ffffff");
    slice.setAttribute("stroke-width", "1.5");

    const showTooltip = (evt) => {
      tooltip.classList.add("show");
      tooltip.innerHTML = `
        <div class="tt-title">${seg.label} Codes</div>
        <div>${seg.count} of ${totalCodes} codes</div>
        <div class="tt-sub">${pct.toFixed(1)}% coverage</div>
      `;
      moveTooltip(evt);
    };

    const moveTooltip = (evt) => {
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = (evt.clientX - rect.left) + "px";
      tooltip.style.top  = (evt.clientY - rect.top) + "px";
    };

    slice.addEventListener("mouseenter", showTooltip);
    slice.addEventListener("mousemove", moveTooltip);
    slice.addEventListener("mouseleave", () => tooltip.classList.remove("show"));

    // Touch support: tap a slice to show its coverage, tap elsewhere to hide.
    slice.addEventListener("touchstart", (evt) => {
      evt.preventDefault();
      showTooltip(evt.touches[0]);
    }, { passive: false });

    svg.appendChild(slice);
    startAngle = endAngle;
  });

  legend.innerHTML = segments.map(seg => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${seg.color}"></div>
      <span>${seg.label} (${seg.count} — ${((seg.count/totalCodes)*100).toFixed(0)}%)</span>
    </div>
  `).join("");
}

function renderBarChart(total, pos, neu, neg) {
  const svg = document.getElementById("bar-chart-svg");
  const legend = document.getElementById("bar-legend");
  const tooltip = document.getElementById("bar-tooltip");
  const wrap = document.getElementById("barChartWrap");
  
  svg.innerHTML = "";
  tooltip.classList.remove("show");

  if (total === 0) {
    legend.innerHTML = `<div class="legend-item">No evaluations yet</div>`;
    return;
  }

  const categories = [
    { key: "positive", label: "Positive", color: "#15803d", count: pos },
    { key: "neutral", label: "Neutral", color: "#ca8a04", count: neu },
    { key: "negative", label: "Negative", color: "#dc2626", count: neg }
  ];

  // Calculate percentages
  const posPercent = (pos / total) * 100;
  const neuPercent = (neu / total) * 100;
  const negPercent = (neg / total) * 100;

  // Chart dimensions
  const width = 500;
  const height = 320;
  const padding = { top: 20, right: 30, bottom: 60, left: 50 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  // Y-axis scale (0-100%)
  const yMin = 0;
  const yMax = 100;
  const yRange = yMax - yMin;

  // Draw Y-axis gridlines and labels
  for (let i = 0; i <= 5; i++) {
    const yVal = (i / 5) * yMax;
    const y = padding.top + chartH - (yVal / yRange) * chartH;

    // Gridline
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", padding.left);
    line.setAttribute("x2", width - padding.right);
    line.setAttribute("y1", y);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "rgba(148,163,184,0.15)");
    line.setAttribute("stroke-width", "1");
    line.setAttribute("stroke-dasharray", "4,2");
    svg.appendChild(line);

    // Y-axis label
    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", padding.left - 10);
    label.setAttribute("y", y + 4);
    label.setAttribute("text-anchor", "end");
    label.setAttribute("font-size", "11");
    label.setAttribute("font-family", "DM Sans, sans-serif");
    label.setAttribute("fill", "#94a3b8");
    label.textContent = yVal.toFixed(0) + "%";
    svg.appendChild(label);
  }

  // Draw axes
  const xAxisY = padding.top + chartH;
  const xAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
  xAxis.setAttribute("x1", padding.left);
  xAxis.setAttribute("x2", width - padding.right);
  xAxis.setAttribute("y1", xAxisY);
  xAxis.setAttribute("y2", xAxisY);
  xAxis.setAttribute("stroke", "#cbd5e1");
  xAxis.setAttribute("stroke-width", "1.5");
  svg.appendChild(xAxis);

  const yAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
  yAxis.setAttribute("x1", padding.left);
  yAxis.setAttribute("x2", padding.left);
  yAxis.setAttribute("y1", padding.top);
  yAxis.setAttribute("y2", padding.top + chartH);
  yAxis.setAttribute("stroke", "#cbd5e1");
  yAxis.setAttribute("stroke-width", "1.5");
  svg.appendChild(yAxis);

  // Draw bars
  const barWidth = chartW / (categories.length * 1.5);
  const barSpacing = chartW / categories.length;
  const baseX = padding.left + barSpacing / 2;

  const percentages = [posPercent, neuPercent, negPercent];

  categories.forEach((cat, idx) => {
    const percentage = percentages[idx];
    const barHeight = (percentage / yRange) * chartH;
    const x = baseX + idx * barSpacing - barWidth / 2;
    const y = xAxisY - barHeight;

    // Bar rectangle
    const bar = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    bar.setAttribute("x", x);
    bar.setAttribute("y", y);
    bar.setAttribute("width", barWidth);
    bar.setAttribute("height", barHeight);
    bar.setAttribute("fill", cat.color);
    bar.setAttribute("rx", "4");
    bar.setAttribute("class", "bar-rect");
    bar.style.cursor = "pointer";
    bar.style.transition = "opacity 0.2s ease";

    // Tooltip on hover
    const showTooltip = (evt) => {
      tooltip.classList.add("show");
      tooltip.innerHTML = `
        <div class="tt-title">${cat.label}</div>
        <div>${cat.count} submissions</div>
        <div class="tt-sub">${percentage.toFixed(1)}% of total</div>
      `;
      moveTooltip(evt);
    };

    const moveTooltip = (evt) => {
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = (evt.clientX - rect.left) + "px";
      tooltip.style.top = (evt.clientY - rect.top) + "px";
    };

    bar.addEventListener("mouseenter", (evt) => {
      bar.style.opacity = "0.8";
      showTooltip(evt);
    });
    bar.addEventListener("mousemove", moveTooltip);
    bar.addEventListener("mouseleave", () => {
      bar.style.opacity = "1";
      tooltip.classList.remove("show");
    });

    // Touch support
    bar.addEventListener("touchstart", (evt) => {
      evt.preventDefault();
      showTooltip(evt.touches[0]);
    }, { passive: false });

    svg.appendChild(bar);

    // Percentage label above bar
    const percentLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
    percentLabel.setAttribute("x", x + barWidth / 2);
    percentLabel.setAttribute("y", y - 8);
    percentLabel.setAttribute("text-anchor", "middle");
    percentLabel.setAttribute("font-size", "12");
    percentLabel.setAttribute("font-family", "Syne, sans-serif");
    percentLabel.setAttribute("font-weight", "700");
    percentLabel.setAttribute("fill", cat.color);
    percentLabel.textContent = percentage.toFixed(1) + "%";
    svg.appendChild(percentLabel);

    // X-axis label
    const xLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
    xLabel.setAttribute("x", x + barWidth / 2);
    xLabel.setAttribute("y", xAxisY + 25);
    xLabel.setAttribute("text-anchor", "middle");
    xLabel.setAttribute("font-size", "12");
    xLabel.setAttribute("font-family", "Syne, sans-serif");
    xLabel.setAttribute("font-weight", "700");
    xLabel.setAttribute("fill", "#1e293b");
    xLabel.textContent = cat.label;
    svg.appendChild(xLabel);
  });

  // Y-axis label
  const yAxisLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
  yAxisLabel.setAttribute("x", 10);
  yAxisLabel.setAttribute("y", padding.top + chartH / 2);
  yAxisLabel.setAttribute("text-anchor", "middle");
  yAxisLabel.setAttribute("font-size", "11");
  yAxisLabel.setAttribute("font-family", "DM Sans, sans-serif");
  yAxisLabel.setAttribute("fill", "#94a3b8");
  yAxisLabel.setAttribute("transform", `rotate(-90, 10, ${padding.top + chartH / 2})`);
  yAxisLabel.textContent = "Percentage (%)";
  svg.appendChild(yAxisLabel);

}

function renderLineChart(){
  const svg = document.getElementById("line-chart-svg");
  const tooltip = document.getElementById("line-tooltip");
  const wrap = document.getElementById("lineWrap");
  svg.innerHTML = "";
  tooltip.classList.remove("show");

  const width = 600, height = 220;
  const padding = { top: 24, right: 20, bottom: 34, left: 28 };
  const chartW = width - padding.left - padding.right;
  const chartH = height - padding.top - padding.bottom;

  // Build last 7 days
  const days_data = [];
  const fullDayNames = [];
  const dateLabels = [];
  const counts = [];
  for (let i = 6; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    const dayName = days[date.getDay()];
    const dayShort = dayName.slice(0, 3);
    
    let dayCount = 0;
    allEvaluations.forEach(item => {
      const evalDate = new Date(item.date);
      if(evalDate.getDay() === date.getDay()){
        dayCount++;
      }
    });
    
    days_data.push(dayShort);
    fullDayNames.push(dayName);
    dateLabels.push(date.toLocaleDateString(undefined, { month: "short", day: "numeric" }));
    counts.push(dayCount);
  }

  const maxCount = Math.max(1, ...counts);
  const xStep = counts.length > 1 ? chartW / (counts.length - 1) : 0;

  const points = counts.map((c, i) => ({
    x: padding.left + i * xStep,
    y: padding.top + chartH - (c / maxCount) * chartH,
    c
  }));

  // Gridlines
  const gridLines = 4;
  for (let g = 0; g <= gridLines; g++) {
    const y = padding.top + (chartH / gridLines) * g;
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", padding.left);
    line.setAttribute("x2", width - padding.right);
    line.setAttribute("y1", y);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "rgba(148,163,184,0.15)");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);
  }

  if (points.length > 1) {
    // Area fill
    const areaPath =
      `M${points[0].x},${padding.top + chartH} ` +
      points.map(p => `L${p.x},${p.y}`).join(" ") +
      ` L${points[points.length - 1].x},${padding.top + chartH} Z`;
    const area = document.createElementNS("http://www.w3.org/2000/svg", "path");
    area.setAttribute("d", areaPath);
    area.setAttribute("fill", "rgba(37,99,235,0.12)");
    area.setAttribute("stroke", "none");
    svg.appendChild(area);

    // Line
    const linePath = points.map((p, i) => (i === 0 ? "M" : "L") + `${p.x},${p.y}`).join(" ");
    const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
    line.setAttribute("d", linePath);
    line.setAttribute("fill", "none");
    line.setAttribute("stroke", "#2563eb");
    line.setAttribute("stroke-width", "2.5");
    line.setAttribute("stroke-linecap", "round");
    line.setAttribute("stroke-linejoin", "round");
    svg.appendChild(line);
  }

  // Dots + labels
  points.forEach((p, i) => {
    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    dot.setAttribute("cx", p.x);
    dot.setAttribute("cy", p.y);
    dot.setAttribute("r", "4");
    dot.setAttribute("fill", "#2563eb");
    dot.setAttribute("stroke", "#ffffff");
    dot.setAttribute("stroke-width", "1.5");
    svg.appendChild(dot);

    const val = document.createElementNS("http://www.w3.org/2000/svg", "text");
    val.setAttribute("x", p.x);
    val.setAttribute("y", p.y - 10);
    val.setAttribute("text-anchor", "middle");
    val.setAttribute("font-size", "10");
    val.setAttribute("font-family", "DM Sans, sans-serif");
    val.setAttribute("fill", "#64748b");
    val.textContent = p.c;
    svg.appendChild(val);

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("x", p.x);
    label.setAttribute("y", height - 10);
    label.setAttribute("text-anchor", "middle");
    label.setAttribute("font-size", "11");
    label.setAttribute("font-family", "DM Sans, sans-serif");
    label.setAttribute("fill", "#94a3b8");
    label.textContent = days_data[i];
    svg.appendChild(label);

    // Wider invisible hit-area so hovering near a point (not just the 4px dot)
    // still triggers the tooltip — the visible dot is too small to target reliably.
    const hitArea = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    hitArea.setAttribute("cx", p.x);
    hitArea.setAttribute("cy", p.y);
    hitArea.setAttribute("r", "14");
    hitArea.setAttribute("fill", "transparent");
    hitArea.style.cursor = "pointer";

    const showTooltip = (evt) => {
      dot.setAttribute("r", "5.5");
      tooltip.classList.add("show");
      tooltip.innerHTML = `
        <div class="tt-title">${fullDayNames[i]}</div>
        <div>${p.c} submission${p.c === 1 ? "" : "s"}</div>
        <div class="tt-sub">${dateLabels[i]}</div>
      `;
      moveTooltip(evt);
    };
    const moveTooltip = (evt) => {
      const rect = wrap.getBoundingClientRect();
      tooltip.style.left = (evt.clientX - rect.left) + "px";
      tooltip.style.top  = (evt.clientY - rect.top) + "px";
    };

    hitArea.addEventListener("mouseenter", showTooltip);
    hitArea.addEventListener("mousemove", moveTooltip);
    hitArea.addEventListener("mouseleave", () => {
      dot.setAttribute("r", "4");
      tooltip.classList.remove("show");
    });
    hitArea.addEventListener("touchstart", (evt) => {
      evt.preventDefault();
      showTooltip(evt.touches[0]);
    }, { passive: false });

    svg.appendChild(hitArea);
  });

  if (allEvaluations.length === 0) {
    const empty = document.createElementNS("http://www.w3.org/2000/svg", "text");
    empty.setAttribute("x", width / 2);
    empty.setAttribute("y", height / 2);
    empty.setAttribute("text-anchor", "middle");
    empty.setAttribute("font-size", "13");
    empty.setAttribute("font-family", "DM Sans, sans-serif");
    empty.setAttribute("fill", "#94a3b8");
    empty.textContent = "No evaluations yet";
    svg.appendChild(empty);
  }
}
</script>
