<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusVoice – Office Management | Admin 2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ── Office Management Page Styles ── */
.office-section {
  max-width: 1200px;
  margin: 0 auto;
}

/* Row that holds the search box + Add Office button side by side */
.search-add-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.search-input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid #bae6fd;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
  box-sizing: border-box;
  color: #1e293b;
  flex: 1;
  min-width: 0;
}
.search-input:focus { border-color: #0284c7; }
.search-input::placeholder { color: #94a3b8; }

/* Office table */
.office-table-wrap {
  max-height: 600px;
  overflow-y: auto;
  border-radius: 12px;
  border: 1px solid #bae6fd;
}
.office-table-wrap::-webkit-scrollbar { width: 6px; }
.office-table-wrap::-webkit-scrollbar-thumb { background: #7dd3fc; border-radius: 999px; }
.office-table-wrap::-webkit-scrollbar-track { background: transparent; }

.office-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

.office-table th {
  text-align: left;
  padding: 14px 16px;
  font-size: 11px;
  color: #475569;
  letter-spacing: .06em;
  text-transform: uppercase;
  border-bottom: 2px solid #bae6fd;
  background: #f0f9ff;
  position: sticky;
  top: 0;
  font-weight: 700;
}

.office-table td {
  padding: 14px 16px;
  border-bottom: 1px solid #f0f9ff;
  font-size: 14px;
  color: #1e293b;
}

.office-table tr:hover td {
  background: #f0f9ff;
}

.rating-cell {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 220px;
}

.rating-track {
  flex: 1;
  height: 8px;
  background: #bae6fd;
  border-radius: 999px;
  overflow: hidden;
  min-width: 130px;
}

.rating-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg,#0284c7,#0ea5e9);
  transition: width .6s ease;
}

.rating-number {
  font-weight: 700;
  color: #0c4a6e;
  width: 34px;
  flex-shrink: 0;
  text-align: right;
}

.eval-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  padding: 4px 10px;
  background: #e0f2fe;
  color: #0c4a6e;
  font-weight: 700;
  font-size: 13px;
  border-radius: 999px;
}

.action-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.action-btn {
  border: none;
  padding: 7px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .2s, transform .2s;
}

.action-btn:hover {
  opacity: .85;
  transform: translateY(-1px);
}

.view-btn {
  background: #dbeafe;
  color: #1e40af;
}

.edit-btn {
  background: #fef3c7;
  color: #92400e;
}

.delete-btn {
  background: #fee2e2;
  color: #991b1b;
}

.action-view { background: #dbeafe; color: #1e40af; }
.action-edit { background: #fef3c7; color: #92400e; }
.action-delete { background: #fee2e2; color: #991b1b; }

.primary-btn {
  border: none;
  background: #0284c7;
  color: white;
  padding: 11px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  box-shadow: 0 4px 14px rgba(2,132,199,.3);
  transition: background .2s, transform .2s;
  white-space: nowrap;
  flex-shrink: 0;
}

.primary-btn:hover {
  background: #0369a1;
  transform: translateY(-1px);
}

.no-results {
  padding: 40px 20px;
  text-align: center;
  color: #64748b;
  font-size: 14px;
}

.stat-card-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card-mini {
  background: white;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid #bae6fd;
  text-align: center;
}

.stat-card-mini-label {
  font-size: 12px;
  color: #64748b;
  font-weight: 600;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .05em;
}

.stat-card-mini-value {
  font-size: 28px;
  font-weight: 800;
  font-family: 'Syne', sans-serif;
  color: #0c4a6e;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #bae6fd;
}

.office-name-cell {
  font-weight: 700;
  color: #1e293b;
}

.evals-cell {
  text-align: center;
}

.actions-cell {
  text-align: right;
}

@media (max-width: 768px) {
  .search-add-row {
    flex-direction: column;
    align-items: stretch;
  }

  .search-add-row .primary-btn {
    width: 100%;
  }

  .stat-card-row {
    grid-template-columns: 1fr;
  }

  .rating-cell {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .action-buttons {
    flex-direction: column;
  }

  .action-btn {
    width: 100%;
    text-align: center;
  }

  .office-table-wrap {
    max-height: 400px;
  }
}
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>

  <main class="main fade-in">
    <div id="topbar-mount"></div>

    <div class="office-section">
      <!-- Stats Row -->
      <div class="stat-card-row">
        <div class="stat-card-mini">
          <div class="stat-card-mini-label">Total Offices</div>
          <div class="stat-card-mini-value" id="totalOffices">0</div>
        </div>
        <div class="stat-card-mini">
          <div class="stat-card-mini-label">Avg Rating</div>
          <div class="stat-card-mini-value" id="avgRating">0.0</div>
        </div>
        <div class="stat-card-mini">
          <div class="stat-card-mini-label">Total Evaluations</div>
          <div class="stat-card-mini-value" id="totalEvals">0</div>
        </div>
      </div>

      <!-- Main Card -->
      <div class="card">
        <!-- Search box + Add Office button, side by side -->
        <div class="search-add-row">
          <input type="text" id="office-search-input" class="search-input" placeholder="🔍 Search offices by name...">
          <button id="btn-add-office" class="primary-btn">+ Add Office</button>
        </div>

        <div class="office-table-wrap">
          <table class="office-table">
            <thead>
              <tr>
                <th>Office Name</th>
                <th>Avg Rating</th>
                <th>Total Evaluations</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="office-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="shared.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  query,
  orderBy,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Build UI
document.getElementById("sidebar-mount").innerHTML = buildSidebar("admin2", "office-mgmt");
document.getElementById("topbar-mount").innerHTML = buildTopbar("Office Management", "admin2");

const OFFICES_COLLECTION = "office-names";
const TOTAL_RATING_QUESTIONS = 15;

let evaluations = [];
let offices = {};

function normalizeName(name) {
  return (name || "").toString().trim().toLowerCase();
}

function avgOf(ev) {
  let sum = 0;
  let count = 0;

  for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
    const val = ev["rating" + i];
    if (typeof val === "number" && !isNaN(val)) {
      sum += val;
      count++;
    }
  }

  return count > 0 ? sum / count : 0;
}

function buildOfficeStats() {
  const statsByKey = {};

  Object.entries(offices).forEach(([key, office]) => {
    statsByKey[key] = { displayName: office.name, total: 0, sum: 0 };
  });

  evaluations.forEach(e => {
    const matchingOfficeKey = Object.entries(offices).find(([_, office]) => 
      normalizeName(office.name) === normalizeName(e.officeName)
    )?.[0];
    
    if (matchingOfficeKey) {
      statsByKey[matchingOfficeKey].total += 1;
      statsByKey[matchingOfficeKey].sum += avgOf(e);
    }
  });

  return statsByKey;
}

const officesCollectionRef = collection(db, OFFICES_COLLECTION);
const officesQuery = query(officesCollectionRef, orderBy("name", "asc"));

onSnapshot(officesQuery, (snapshot) => {
  offices = {};
  snapshot.forEach((doc) => {
    const data = doc.data();
    offices[doc.id] = {
      id: doc.id,
      name: data.name || data.officeName || doc.id
    };
  });

  renderOfficeTable();
});

const evalCollectionRef = collection(db, "cleanliness_evaluations");

onSnapshot(evalCollectionRef, (snapshot) => {
  evaluations = [];
  snapshot.forEach((doc) => {
    const data = doc.data();

    const record = {
      id: doc.id,
      officeName: data.officeName || "Unknown",
      comments: data.comments || "",
      timestamp: Number(data.timestamp) || 0
    };

    for (let i = 1; i <= TOTAL_RATING_QUESTIONS; i++) {
      record["rating" + i] = Number(data["rating" + i]) || 0;
    }

    evaluations.push(record);
  });

  renderOfficeTable();
});

const officeTableBody = document.getElementById("office-table-body");
const officeSearchInput = document.getElementById("office-search-input");

let officeSearchTerm = "";

officeSearchInput.addEventListener("input", (e) => {
  officeSearchTerm = e.target.value.toLowerCase();
  renderOfficeTable();
});

function updateSummary() {
  const keys = Object.keys(offices);
  const totalOffices = keys.length;
  
  const statsByKey = buildOfficeStats();
  
  let totalEvals = 0;
  let totalSum = 0;
  
  Object.values(statsByKey).forEach(stats => {
    totalEvals += stats.total;
    totalSum += stats.sum;
  });
  
  const overallAvg = totalEvals > 0 ? totalSum / totalEvals : 0;

  document.getElementById("totalOffices").textContent = totalOffices;
  document.getElementById("avgRating").textContent = overallAvg.toFixed(1);
  document.getElementById("totalEvals").textContent = totalEvals;
}

function renderOfficeTable() {
  updateSummary();
  
  const keys = Object.keys(offices).sort((a, b) =>
    offices[a].name.localeCompare(offices[b].name, undefined, {
      sensitivity: "base"
    })
  );

  if (keys.length === 0) {
    officeTableBody.innerHTML = `<tr><td colspan="4" class="no-results">No offices added yet.</td></tr>`;
    return;
  }

  const statsByKey = buildOfficeStats();

  let filteredKeys = keys;
  if (officeSearchTerm) {
    filteredKeys = keys.filter(key => offices[key].name.toLowerCase().includes(officeSearchTerm));
  }

  if (filteredKeys.length === 0) {
    officeTableBody.innerHTML = `<tr><td colspan="4" class="no-results">No offices match your search.</td></tr>`;
    return;
  }

  officeTableBody.innerHTML = filteredKeys.map(key => {
    const office = offices[key];
    const name = office.name;
    const stats = statsByKey[key] || { total: 0, sum: 0 };
    const avg = stats.total > 0 ? stats.sum / stats.total : 0;
    const ratingPercent = (avg / 5) * 100;

    return `
      <tr>
        <td class="office-name-cell"><strong>${name}</strong></td>
        <td>
          <div class="rating-cell">
            <div class="rating-track"><div class="rating-fill" style="width:${ratingPercent}%"></div></div>
            <span class="rating-number">${avg.toFixed(1)}</span>
          </div>
        </td>
        <td class="evals-cell"><span class="eval-count">${stats.total}</span></td>
        <td class="actions-cell">
          <div class="action-buttons">
            <button class="action-btn action-view" data-office-key="${key}" data-action="view">👁 View</button>
            <button class="action-btn action-edit" data-office-key="${key}" data-action="edit">✏ Edit</button>
            <button class="action-btn action-delete" data-office-key="${key}" data-action="delete">🗑 Delete</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");

  officeTableBody.querySelectorAll("[data-action='view']").forEach(btn => {
    btn.addEventListener("click", () => viewOfficeAnalytics(btn.getAttribute("data-office-key")));
  });
  officeTableBody.querySelectorAll("[data-action='edit']").forEach(btn => {
    btn.addEventListener("click", () => editOffice(btn.getAttribute("data-office-key")));
  });
  officeTableBody.querySelectorAll("[data-action='delete']").forEach(btn => {
    btn.addEventListener("click", () => deleteOffice(btn.getAttribute("data-office-key")));
  });
}

window.viewOfficeAnalytics = function(key) {
  const office = offices[key];
  const name = office.name || "";
  const url = `admin2-office-analytics.html?office=${encodeURIComponent(key)}&name=${encodeURIComponent(name)}`;
  window.location.href = url;
};

window.editOffice = async function(key) {
  const office = offices[key];
  const currentName = office.name || "";
  const newName = prompt("Edit office name:", currentName);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed || trimmed === currentName) return;

  try {
    await updateDoc(doc(db, OFFICES_COLLECTION, key), { name: trimmed });
    alert("✓ Office updated successfully!");
  } catch (err) {
    alert("Couldn't update office: " + err.message);
  }
};

window.deleteOffice = async function(key) {
  const office = offices[key];
  const name = office.name || "this office";
  if (!confirm(`Remove "${name}" from the office list?`)) return;

  try {
    await deleteDoc(doc(db, OFFICES_COLLECTION, key));
    alert("✓ Office deleted successfully!");
  } catch (err) {
    alert("Couldn't remove office: " + err.message);
  }
};

window.addOffice = async function() {
  const name = prompt("New office name (e.g. Registrar):");
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed) return;

  try {
    await addDoc(collection(db, OFFICES_COLLECTION), { name: trimmed });
    alert("✓ Office added successfully!");
  } catch (err) {
    alert("Couldn't add office: " + err.message);
  }
};

document.getElementById("btn-add-office").addEventListener("click", addOffice);

</script>
</body>
</html>
