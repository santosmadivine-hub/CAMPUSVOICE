<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusVoice – Office Management | Admin 3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* ─── Card styling ─── */
  .card {
    background: #ffffff;
    border: 1px solid #eef2f7;
    border-radius: 18px;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    padding: 22px 24px 26px;
    margin-bottom: 28px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: #0f172a;
    margin: 0;
  }

  .card-sub {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 13px;
    color: #94a3b8;
  }

  /* ─── Summary Cards ─── */
  .summary-cards-container {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .summary-card {
    background: #ffffff;
    border: 1px solid #eef2f7;
    border-radius: 14px;
    padding: 16px 18px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
  }

  .summary-card.card-primary {
    background: #f0f9ff;
    border-color: #bfdbfe;
  }

  .summary-card.card-warning {
    background: #fffbeb;
    border-color: #fde68a;
  }

  .summary-card.card-success {
    background: #f0fdf4;
    border-color: #bbf7d0;
  }

  .summary-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .summary-content {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #94a3b8;
    line-height: 1;
  }

  .summary-value {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #0f172a;
    line-height: 1.2;
  }

  /* ─── Buttons ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 10px;
    transition: transform 0.15s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary {
    background: #2563eb;
    color: #fff;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    opacity: 0.92;
  }

  .btn-secondary {
    background: #e2e8f0;
    color: #0f172a;
  }

  .btn-secondary:hover {
    background: #cbd5e1;
  }

  /* ─── Office Management Header ─── */
  .office-mgmt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .office-mgmt-actions {
    display: flex;
    gap: 10px;
  }

  /* ─── Search Input ─── */
  .office-search-input {
    width: 100%;
    height: 44px;
    padding: 10px 14px;
    border: 1px solid #dbe4ee;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s ease;
    box-sizing: border-box;
    background: #f8fafc;
    color: #0f172a;
  }

  .office-search-input::placeholder {
    color: #94a3b8;
  }

  .office-search-input:focus {
    border-color: #2563eb;
    background: #ffffff;
  }

  /* ─── Table Styles ─── */
  .office-table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
  }

  .office-table-scroll::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }

  .office-table-scroll::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 999px;
  }

  .office-table-scroll::-webkit-scrollbar-track {
    background: transparent;
  }

  .office-table {
    width: 100%;
    border-collapse: collapse;
  }

  .office-table thead th {
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #94a3b8;
    padding: 14px 16px;
    border-bottom: 1px solid #e2e8f0;
    background: #f8fafc;
    white-space: nowrap;
  }

  .office-table thead th:first-child {
    border-radius: 10px 0 0 0;
  }

  .office-table thead th:last-child {
    border-radius: 0 10px 0 0;
  }

  .office-table tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid #edf2f7;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #334155;
    vertical-align: middle;
  }

  .office-table tbody tr {
    transition: background-color 0.15s ease;
  }

  .office-table tbody tr:hover {
    background: #f8fafc;
  }

  .office-table tbody tr:hover td {
    border-bottom-color: #e2e8f0;
  }

  .office-table tbody tr:last-child td {
    border-bottom: none;
  }

  .office-name-cell {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: #0f172a;
  }

  .rating-cell {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 200px;
  }

  .rating-track {
    flex: 1;
    height: 8px;
    background: #dbeafe;
    border-radius: 999px;
    overflow: hidden;
    min-width: 100px;
  }

  .rating-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #2563eb, #60a5fa);
    transition: width 0.6s ease;
  }

  .rating-number {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: #1e40af;
    width: 30px;
    flex-shrink: 0;
    text-align: right;
  }

  .evals-cell {
    text-align: center;
    font-weight: 600;
    color: #0f172a;
  }

  .actions-cell {
    text-align: right;
    white-space: nowrap;
  }

  .office-empty-row td {
    text-align: center;
    color: #94a3b8;
    padding: 32px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }

  /* ─── Action Buttons ─── */
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background-color 0.15s ease, transform 0.15s ease;
  }

  .action-btn + .action-btn {
    margin-left: 6px;
  }

  .action-view {
    background: #dbeafe;
    color: #1e40af;
  }

  .action-view:hover {
    background: #bfdbfe;
  }

  .action-edit {
    background: #fef3c7;
    color: #92400e;
  }

  .action-edit:hover {
    background: #fde68a;
  }

  .action-delete {
    background: #fee2e2;
    color: #991b1b;
  }

  .action-delete:hover {
    background: #fecaca;
  }

  .action-btn:active {
    transform: scale(0.97);
  }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .office-mgmt-header {
      flex-direction: column;
      align-items: flex-start;
    }

    .office-mgmt-actions {
      width: 100%;
    }

    .office-mgmt-actions .btn {
      flex: 1;
      justify-content: center;
    }

    .summary-cards-container {
      flex-direction: column;
    }

    .summary-card {
      width: 100%;
    }

    .office-table {
      font-size: 12px;
    }

    .office-table thead th,
    .office-table tbody td {
      padding: 12px 14px;
    }

    .action-btn {
      font-size: 11px;
      padding: 5px 10px;
    }
  }

  @media (max-width: 600px) {
    .card {
      padding: 16px 16px 20px;
    }

    .card-title {
      font-size: 15px;
    }

    .summary-value {
      font-size: 16px;
    }

    .office-table {
      min-width: 500px;
    }

    .actions-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .action-btn {
      width: 100%;
      justify-content: center;
    }

    .action-btn + .action-btn {
      margin-left: 0;
    }
  }
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main fade-in">
    <div id="topbar-mount"></div>

    <div style="margin-top: 28px; padding: 0 20px 40px;">
      <!-- SUMMARY CARDS -->
      <div class="summary-cards-container">
        <div class="summary-card card-primary">
          <div class="summary-icon">🏢</div>
          <div class="summary-content">
            <div class="summary-label">Offices</div>
            <div class="summary-value" id="summary-total-offices-count">0</div>
          </div>
        </div>
        <div class="summary-card card-warning">
          <div class="summary-icon">⭐</div>
          <div class="summary-content">
            <div class="summary-label">Avg Rating</div>
            <div class="summary-value" id="summary-avg-rating">0</div>
          </div>
        </div>
        <div class="summary-card card-success">
          <div class="summary-icon">📊</div>
          <div class="summary-content">
            <div class="summary-label">Evaluations</div>
            <div class="summary-value" id="summary-total-evals">0</div>
          </div>
        </div>
      </div>

      <!-- OFFICE MANAGEMENT -->
      <div class="card">
        <div class="office-mgmt-header">
          <div>
            <div class="card-title">Office Management <span class="card-sub">— Manage campus offices</span></div>
          </div>
          <div class="office-mgmt-actions">
            <button class="btn btn-primary" id="btn-add-office">+ Add Office</button>
          </div>
        </div>

        <div>
          <input type="text" id="office-search-input" class="office-search-input" placeholder="🔍 Search offices...">
          <div class="office-table-scroll">
            <table class="office-table">
              <thead>
                <tr>
                  <th>Office</th>
                  <th>Avg Rating</th>
                  <th>Total Evaluations</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="office-table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="shared.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Build UI
document.getElementById("sidebar-mount").innerHTML = buildSidebar("admin3", "office-mgmt");
document.getElementById("topbar-mount").innerHTML = buildTopbar("Office Management", "admin3");

// ======================
// STATE
// ======================
let evaluations = [];
let offices = {};

function normalizeName(name) {
  return (name || "").toString().trim().toLowerCase();
}

function avgOf(ev) {
  return (ev.rating1 + ev.rating2 + ev.rating3 + ev.rating4 + ev.rating5 + 
          ev.rating6 + ev.rating7 + ev.rating8 + ev.rating9 + ev.rating10) / 10;
}

function buildOfficeStats() {
  const statsByKey = {};

  Object.entries(offices).forEach(([key, name]) => {
    const normalizedKey = normalizeName(name);
    statsByKey[normalizedKey] = { docId: key, displayName: name, total: 0, sum: 0 };
  });

  evaluations.forEach(e => {
    const key = normalizeName(e.officeName);
    if (!statsByKey[key]) return;
    statsByKey[key].total += 1;
    statsByKey[key].sum += avgOf(e);
  });

  return statsByKey;
}

// ======================
// LOAD OFFICES FROM FIRESTORE
// ======================
const officesRef = collection(db, "offices");

onSnapshot(officesRef, (snapshot) => {
  offices = {};
  snapshot.docs.forEach((doc) => {
    offices[doc.id] = doc.data().name || doc.id;
  });

  renderOfficeTable();
});

// ======================
// LOAD EVALUATIONS FROM FIRESTORE
// ======================
const evalRef = collection(db, "facility_evaluations");

onSnapshot(evalRef, (snapshot) => {
  evaluations = snapshot.docs.map((doc) => {
    const ev = doc.data();
    return {
      id: doc.id,
      officeName: ev.officeName || "Unknown",
      rating1: Number(ev.rating1) || 0,
      rating2: Number(ev.rating2) || 0,
      rating3: Number(ev.rating3) || 0,
      rating4: Number(ev.rating4) || 0,
      rating5: Number(ev.rating5) || 0,
      rating6: Number(ev.rating6) || 0,
      rating7: Number(ev.rating7) || 0,
      rating8: Number(ev.rating8) || 0,
      rating9: Number(ev.rating9) || 0,
      rating10: Number(ev.rating10) || 0
    };
  });

  renderOfficeTable();
});

// ======================
// TABLE RENDERING
// ======================
const officeTableBody = document.getElementById("office-table-body");
const officeSearchInput = document.getElementById("office-search-input");

let officeSearchTerm = "";

officeSearchInput.addEventListener("input", (e) => {
  officeSearchTerm = e.target.value.toLowerCase();
  renderOfficeTable();
});

function updateSummary() {
  const keys = Object.keys(offices);
  const totalOffices = keys.length;

  const statsByKey = buildOfficeStats();

  let totalEvals = 0;
  let totalSum = 0;

  Object.values(statsByKey).forEach(stats => {
    totalEvals += stats.total;
    totalSum += stats.sum;
  });

  const overallAvg = totalEvals > 0 ? totalSum / totalEvals : 0;

  document.getElementById("summary-total-offices-count").textContent = totalOffices;
  document.getElementById("summary-avg-rating").textContent = overallAvg.toFixed(1);
  document.getElementById("summary-total-evals").textContent = totalEvals;
}

function renderOfficeTable() {
  updateSummary();

  const keys = Object.keys(offices).sort((a, b) =>
    offices[a].localeCompare(offices[b], undefined, { sensitivity: "base" })
  );

  if (keys.length === 0) {
    officeTableBody.innerHTML = `<tr class="office-empty-row"><td colspan="4">No offices added yet.</td></tr>`;
    return;
  }

  const statsByKey = buildOfficeStats();

  let filteredKeys = keys;
  if (officeSearchTerm) {
    filteredKeys = keys.filter(key => offices[key].toLowerCase().includes(officeSearchTerm));
  }

  if (filteredKeys.length === 0) {
    officeTableBody.innerHTML = `<tr class="office-empty-row"><td colspan="4">No offices match your search.</td></tr>`;
    return;
  }

  officeTableBody.innerHTML = filteredKeys.map(key => {
    const name = offices[key];
    const stats = statsByKey[normalizeName(name)] || { total: 0, sum: 0 };
    const avg = stats.total > 0 ? stats.sum / stats.total : 0;
    const pct = (avg / 5) * 100;

    return `
      <tr>
        <td class="office-name-cell">${name}</td>
        <td>
          <div class="rating-cell">
            <div class="rating-track"><div class="rating-fill" style="width:${pct}%"></div></div>
            <span class="rating-number">${avg.toFixed(1)}</span>
          </div>
        </td>
        <td class="evals-cell">${stats.total}</td>
        <td class="actions-cell">
          <button class="action-btn action-view" data-office-key="${key}" data-office-name="${name}">👁️ View</button>
          <button class="action-btn action-edit" data-office-key="${key}">✏️ Edit</button>
          <button class="action-btn action-delete" data-office-key="${key}">🗑️ Delete</button>
        </td>
      </tr>
    `;
  }).join("");

  officeTableBody.querySelectorAll(".action-view").forEach(btn => {
    btn.addEventListener("click", () => viewOfficeAnalytics(btn.getAttribute("data-office-key"), btn.getAttribute("data-office-name")));
  });

  officeTableBody.querySelectorAll(".action-edit").forEach(btn => {
    btn.addEventListener("click", () => editOffice(btn.getAttribute("data-office-key")));
  });

  officeTableBody.querySelectorAll(".action-delete").forEach(btn => {
    btn.addEventListener("click", () => deleteOffice(btn.getAttribute("data-office-key")));
  });
}

function viewOfficeAnalytics(docId, officeName) {
  const url = `admin3-office-analytics.html?office=${encodeURIComponent(docId)}&name=${encodeURIComponent(officeName)}`;
  window.location.href = url;
}

async function editOffice(docId) {
  const currentName = offices[docId] || "";
  const newName = prompt("Edit office name:", currentName);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed || trimmed === currentName) return;

  try {
    await updateDoc(doc(db, "offices", docId), {
      name: trimmed
    });
  } catch (err) {
    alert("Couldn't update office: " + err.message);
    console.error(err);
  }
}

async function deleteOffice(docId) {
  const name = offices[docId] || "this office";
  if (!confirm(`Remove "${name}" from the office list?`)) return;

  try {
    await deleteDoc(doc(db, "offices", docId));
  } catch (err) {
    alert("Couldn't remove office: " + err.message);
    console.error(err);
  }
}

async function addOffice() {
  const name = prompt("New office name (e.g. Registrar):");
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed) return;

  try {
    await addDoc(collection(db, "offices"), {
      name: trimmed
    });
  } catch (err) {
    alert("Couldn't add office: " + err.message);
    console.error(err);
  }
}

document.getElementById("btn-add-office").addEventListener("click", addOffice);

</script>
</body>
</html>
