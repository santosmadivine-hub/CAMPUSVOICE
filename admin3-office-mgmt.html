<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusVoice – Office Management | Admin 3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* ─── Office Management Page Styles ─── */
  .office-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  /* ─── Stat cards grid ─── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }

  .stat-card {
    position: relative;
    background: #ffffff;
    border: 1px solid #bae6fd;
    border-top: 4px solid #2563eb;
    border-radius: 16px;
    padding: 20px 20px 22px;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-icon {
    position: absolute;
    top: 18px;
    right: 18px;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .stat-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: #0f172a;
    line-height: 1.1;
    overflow-wrap: anywhere;
  }

  .stat-value-text {
    font-size: 20px;
  }

  .stat-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: #94a3b8;
  }

  /* ─── Card styling ─── */
  .card {
    background: #ffffff;
    border: 1px solid #bae6fd;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    padding: 20px;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #0f172a;
    margin: 0 0 12px 0;
  }

  /* Row that holds the search box + Add Office button side by side */
  .search-add-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .search-input {
    width: 100%;
    padding: 11px 14px;
    border: 1px solid #bae6fd;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
    box-sizing: border-box;
    color: #1e293b;
    flex: 1;
    min-width: 0;
  }

  .search-input:focus {
    border-color: #0284c7;
  }

  .search-input::placeholder {
    color: #94a3b8;
  }

  /* Office table */
  .office-table-wrap {
    max-height: 600px;
    overflow-y: auto;
    border-radius: 12px;
    border: 1px solid #bae6fd;
  }

  .office-table-wrap::-webkit-scrollbar {
    width: 6px;
  }

  .office-table-wrap::-webkit-scrollbar-thumb {
    background: #7dd3fc;
    border-radius: 999px;
  }

  .office-table-wrap::-webkit-scrollbar-track {
    background: transparent;
  }

  .office-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
  }

  .office-table th {
    text-align: left;
    padding: 14px 16px;
    font-size: 11px;
    color: #475569;
    letter-spacing: .06em;
    text-transform: uppercase;
    border-bottom: 2px solid #bae6fd;
    background: #f0f9ff;
    position: sticky;
    top: 0;
    font-weight: 700;
  }

  .office-table td {
    padding: 14px 16px;
    border-bottom: 1px solid #f0f9ff;
    font-size: 14px;
    color: #1e293b;
  }

  .office-table tbody tr:hover td {
    background: #f0f9ff;
  }

  .rating-cell {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 220px;
  }

  .rating-track {
    flex: 1;
    height: 8px;
    background: #bae6fd;
    border-radius: 999px;
    overflow: hidden;
    min-width: 130px;
  }

  .rating-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #0284c7, #0ea5e9);
    transition: width .6s ease;
  }

  .rating-number {
    font-weight: 700;
    color: #0c4a6e;
    width: 34px;
    flex-shrink: 0;
    text-align: right;
  }

  .eval-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 32px;
    padding: 4px 10px;
    background: #e0f2fe;
    color: #0c4a6e;
    font-weight: 700;
    font-size: 13px;
    border-radius: 999px;
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .action-btn {
    border: none;
    padding: 7px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .2s, transform .2s;
  }

  .action-btn:hover {
    opacity: .85;
    transform: translateY(-1px);
  }

  .action-view {
    background: #dbeafe;
    color: #1e40af;
  }

  .action-edit {
    background: #fef3c7;
    color: #92400e;
  }

  .action-delete {
    background: #fee2e2;
    color: #991b1b;
  }

  .primary-btn {
    border: none;
    background: #0284c7;
    color: white;
    padding: 11px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    box-shadow: 0 4px 14px rgba(2, 132, 199, .3);
    transition: background .2s, transform .2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .primary-btn:hover {
    background: #0369a1;
    transform: translateY(-1px);
  }

  .no-results {
    padding: 40px 20px;
    text-align: center;
    color: #64748b;
    font-size: 14px;
  }

  .office-name-cell {
    font-weight: 700;
    color: #1e293b;
  }

  .evals-cell {
    text-align: center;
  }

  .actions-cell {
    text-align: right;
  }

  /* ─── Responsive ─── */
  @media (max-width: 1200px) {
    .stat-value {
      font-size: 30px;
    }
    .stat-value-text {
      font-size: 18px;
    }
  }

  @media (max-width: 1024px) {
    .stat-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .stat-grid {
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .search-add-row {
      flex-direction: column;
      align-items: stretch;
    }

    .search-add-row .primary-btn {
      width: 100%;
    }

    .rating-cell {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .action-buttons {
      flex-direction: column;
    }

    .action-btn {
      width: 100%;
      text-align: center;
    }

    .office-table-wrap {
      max-height: 400px;
    }
  }

  @media (max-width: 600px) {
    .stat-card {
      padding: 16px 16px 18px;
    }
    .stat-value {
      font-size: 26px;
    }
    .stat-value-text {
      font-size: 16px;
    }
    .stat-icon {
      width: 32px;
      height: 32px;
      font-size: 14px;
      top: 14px;
      right: 14px;
    }
  }

  @media (max-width: 480px) {
    .stat-grid {
      grid-template-columns: 1fr;
    }
    .stat-value {
      font-size: 28px;
    }
    .stat-value-text {
      font-size: 18px;
    }
  }
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main fade-in">
    <div id="topbar-mount"></div>

    <div class="office-section">
      <!-- Stats Grid -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon">🏢</div>
          <div class="stat-label">Total Offices</div>
          <div class="stat-value" id="summary-total-offices-count">0</div>
          <div class="stat-sub">All Offices</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📊</div>
          <div class="stat-label">Total Evaluations</div>
          <div class="stat-value" id="summary-total-evals">0</div>
          <div class="stat-sub">All Time</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-label">Highest Rating</div>
          <div class="stat-value stat-value-text" id="summary-highest-office">—</div>
          <div class="stat-sub">Top Office</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📉</div>
          <div class="stat-label">Lowest Rating</div>
          <div class="stat-value stat-value-text" id="summary-lowest-office">—</div>
          <div class="stat-sub">Needs Support</div>
        </div>
      </div>

      <!-- Main Card -->
      <div class="card">
        <div class="card-title">Office Management</div>

        <!-- Search box + Add Office button, side by side -->
        <div class="search-add-row">
          <input type="text" id="office-search-input" class="search-input" placeholder="🔍 Search offices by name...">
          <button id="btn-add-office" class="primary-btn">+ Add Office</button>
        </div>

        <div class="office-table-wrap">
          <table class="office-table">
            <thead>
              <tr>
                <th>Office Name</th>
                <th>Avg Rating</th>
                <th>Total Evaluations</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="office-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="shared.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  addDoc,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Build UI
document.getElementById("sidebar-mount").innerHTML = buildSidebar("admin3", "office-mgmt");
document.getElementById("topbar-mount").innerHTML = buildTopbar("Office Management", "admin3");

// ======================
// STATE
// ======================
let evaluations = [];
let offices = {};

function normalizeName(name) {
  return (name || "").toString().trim().toLowerCase();
}

function avgOf(ev) {
  return (ev.rating1 + ev.rating2 + ev.rating3 + ev.rating4 + ev.rating5 + 
          ev.rating6 + ev.rating7 + ev.rating8 + ev.rating9 + ev.rating10) / 10;
}

function buildOfficeStats() {
  const statsByKey = {};

  Object.entries(offices).forEach(([key, name]) => {
    const normalizedKey = normalizeName(name);
    statsByKey[normalizedKey] = { docId: key, displayName: name, total: 0, sum: 0 };
  });

  evaluations.forEach(e => {
    const key = normalizeName(e.officeName);
    if (!statsByKey[key]) return;
    statsByKey[key].total += 1;
    statsByKey[key].sum += avgOf(e);
  });

  return statsByKey;
}

// ======================
// LOAD OFFICES FROM FIRESTORE
// ======================
const officesRef = collection(db, "offices");

onSnapshot(officesRef, (snapshot) => {
  offices = {};
  snapshot.docs.forEach((doc) => {
    offices[doc.id] = doc.data().name || doc.id;
  });

  renderOfficeTable();
});

// ======================
// LOAD EVALUATIONS FROM FIRESTORE
// ======================
const evalRef = collection(db, "facility_evaluations");

onSnapshot(evalRef, (snapshot) => {
  evaluations = snapshot.docs.map((doc) => {
    const ev = doc.data();
    return {
      id: doc.id,
      officeName: ev.officeName || "Unknown",
      rating1: Number(ev.rating1) || 0,
      rating2: Number(ev.rating2) || 0,
      rating3: Number(ev.rating3) || 0,
      rating4: Number(ev.rating4) || 0,
      rating5: Number(ev.rating5) || 0,
      rating6: Number(ev.rating6) || 0,
      rating7: Number(ev.rating7) || 0,
      rating8: Number(ev.rating8) || 0,
      rating9: Number(ev.rating9) || 0,
      rating10: Number(ev.rating10) || 0
    };
  });

  renderOfficeTable();
});

// ======================
// TABLE RENDERING
// ======================
const officeTableBody = document.getElementById("office-table-body");
const officeSearchInput = document.getElementById("office-search-input");

let officeSearchTerm = "";

officeSearchInput.addEventListener("input", (e) => {
  officeSearchTerm = e.target.value.toLowerCase();
  renderOfficeTable();
});

function updateSummary() {
  const keys = Object.keys(offices);
  const totalOffices = keys.length;

  const statsByKey = buildOfficeStats();

  let totalEvals = 0;
  let highestOffice = "—";
  let lowestOffice = "—";
  let highestRating = -1;
  let lowestRating = 11;

  Object.values(statsByKey).forEach(stats => {
    totalEvals += stats.total;

    if (stats.total > 0) {
      const avg = stats.sum / stats.total;

      if (avg > highestRating) {
        highestRating = avg;
        highestOffice = stats.displayName;
      }

      if (avg < lowestRating) {
        lowestRating = avg;
        lowestOffice = stats.displayName;
      }
    }
  });

  document.getElementById("summary-total-offices-count").textContent = totalOffices;
  document.getElementById("summary-avg-rating").textContent = highestRating > -1 ? highestRating.toFixed(1) : "—";
  document.getElementById("summary-total-evals").textContent = totalEvals;
  document.getElementById("summary-highest-office").textContent = highestOffice;
  document.getElementById("summary-lowest-office").textContent = lowestOffice;
}

function renderOfficeTable() {
  updateSummary();

  const keys = Object.keys(offices).sort((a, b) =>
    offices[a].localeCompare(offices[b], undefined, { sensitivity: "base" })
  );

  if (keys.length === 0) {
    officeTableBody.innerHTML = `<tr class="office-empty-row"><td colspan="4" class="no-results">No offices added yet.</td></tr>`;
    return;
  }

  const statsByKey = buildOfficeStats();

  let filteredKeys = keys;
  if (officeSearchTerm) {
    filteredKeys = keys.filter(key => offices[key].toLowerCase().includes(officeSearchTerm));
  }

  if (filteredKeys.length === 0) {
    officeTableBody.innerHTML = `<tr><td colspan="4" class="no-results">No offices match your search.</td></tr>`;
    return;
  }

  officeTableBody.innerHTML = filteredKeys.map(key => {
    const name = offices[key];
    const stats = statsByKey[normalizeName(name)] || { total: 0, sum: 0 };
    const avg = stats.total > 0 ? stats.sum / stats.total : 0;
    const pct = (avg / 10) * 100;

    return `
      <tr>
        <td class="office-name-cell">${name}</td>
        <td>
          <div class="rating-cell">
            <div class="rating-track"><div class="rating-fill" style="width:${pct}%"></div></div>
            <span class="rating-number">${avg.toFixed(1)}</span>
          </div>
        </td>
        <td class="evals-cell"><span class="eval-count">${stats.total}</span></td>
        <td class="actions-cell">
          <div class="action-buttons">
            <button class="action-btn action-view" data-office-key="${key}" data-office-name="${name}">👁️ View</button>
            <button class="action-btn action-edit" data-office-key="${key}">✏️ Edit</button>
            <button class="action-btn action-delete" data-office-key="${key}">🗑️ Delete</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");

  officeTableBody.querySelectorAll(".action-view").forEach(btn => {
    btn.addEventListener("click", () => viewOfficeAnalytics(btn.getAttribute("data-office-key"), btn.getAttribute("data-office-name")));
  });

  officeTableBody.querySelectorAll(".action-edit").forEach(btn => {
    btn.addEventListener("click", () => editOffice(btn.getAttribute("data-office-key")));
  });

  officeTableBody.querySelectorAll(".action-delete").forEach(btn => {
    btn.addEventListener("click", () => deleteOffice(btn.getAttribute("data-office-key")));
  });
}

function viewOfficeAnalytics(docId, officeName) {
  const url = `admin3-office-analytics.html?office=${encodeURIComponent(docId)}&name=${encodeURIComponent(officeName)}`;
  window.location.href = url;
}

async function editOffice(docId) {
  const currentName = offices[docId] || "";
  const newName = prompt("Edit office name:", currentName);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (!trimmed || trimmed === currentName) return;

  try {
    await updateDoc(doc(db, "offices", docId), {
      name: trimmed
    });
  } catch (err) {
    alert("Couldn't update office: " + err.message);
    console.error(err);
  }
}

async function deleteOffice(docId) {
  const name = offices[docId] || "this office";
  if (!confirm(`Remove "${name}" from the office list?`)) return;

  try {
    await deleteDoc(doc(db, "offices", docId));
  } catch (err) {
    alert("Couldn't remove office: " + err.message);
    console.error(err);
  }
}

async function addOffice() {
  const name = prompt("New office name (e.g. Registrar):");
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed) return;

  try {
    await addDoc(collection(db, "offices"), {
      name: trimmed
    });
  } catch (err) {
    alert("Couldn't add office: " + err.message);
    console.error(err);
  }
}

document.getElementById("btn-add-office").addEventListener("click", addOffice);

</script>
</body>
</html>
