<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase Configuration
const firebaseConfig = {
  apiKey: "AIzaSyBGLm1iZIMEfNfZIWbGXs8teGwJXHmLr1E",
  authDomain: "kristal-adb78.firebaseapp.com",
  databaseURL: "https://kristal-adb78-default-rtdb.firebaseio.com",
  projectId: "kristal-adb78",
  storageBucket: "kristal-adb78.firebasestorage.app",
  messagingSenderId: "1016283938031",
  appId: "1:1016283938031:web:54c4d13409d9784ad7af1a",
  measurementId: "G-LK8D1CBQ2J"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const EVAL_COLLECTION = "facility_evaluations";
const HISTORY_COLLECTION = "evaluation_history";
const OFFICE_COLLECTION = "offices";
const LOW_RATING_THRESHOLD = 3;
const STATUS_META = {
  pending: { label: "Pending", icon: "⏳" },
  no_action: { label: "No Action Required", icon: "🙅" },
  resolved: { label: "Resolved", icon: "✅" }
};

// Build Sidebar & Topbar
document.getElementById("sidebar-mount").innerHTML =
  buildSidebar("admin3", "eval-mgmt");

document.getElementById("topbar-mount").innerHTML =
  buildTopbar("Evaluation Management", "admin3");

// ======================
// STATE
// ======================
let evaluations = [];   // [{id, code, officeName, rating1..10, comments, date, status, evidence}]
let offices = {};       // { officeKey: officeName }
let searchTerm = "";
let officeFilter = "";
let currentTab = "recent"; // "recent" | "pending" | "no_action" | "resolved"
let editingId = null;

// ======================
// HELPERS
// ======================
function makeCode(officeName, id) {
  const prefix = (officeName || "GEN")
    .toUpperCase()
    .replace(/[^A-Z0-9]/g, "")
    .slice(0, 4) || "GEN";
  const suffix = id.slice(-6).toUpperCase();
  return `${prefix}-${suffix}`;
}

function parseEvalDate(ev) {
  if (ev.date === undefined || ev.date === null || ev.date === "") return 0;

  if (typeof ev.date === "number") return ev.date;

  // Firestore Timestamp objects expose toMillis()
  if (typeof ev.date === "object" && typeof ev.date.toMillis === "function") {
    return ev.date.toMillis();
  }

  const asNumber = Number(ev.date);
  if (!Number.isNaN(asNumber) && String(ev.date).trim() !== "") return asNumber;

  const parsed = new Date(ev.date).getTime();
  return Number.isNaN(parsed) ? 0 : parsed;
}

function parseEvalStatus(ev, avgRating) {
  const stored = (ev.status || "").toString().toLowerCase();
  if (stored === "resolved" || stored === "pending" || stored === "no_action") {
    return stored;
  }
  return avgRating < LOW_RATING_THRESHOLD ? "pending" : "no_action";
}

function parseEvidence(data) {
  const items = [];

  if (Array.isArray(data.evidenceUrls) && data.evidenceUrls.length) {
    const urls = data.evidenceUrls;
    const types = Array.isArray(data.evidenceTypes) ? data.evidenceTypes : [];
    urls.forEach((url, i) => {
      if (url) items.push({ url, type: types[i] === "video" ? "video" : "image" });
    });
    return items;
  }

  if (data.evidenceUrl) {
    items.push({ url: data.evidenceUrl, type: data.evidenceType === "video" ? "video" : "image" });
    return items;
  }

  if (data.fileUrl) {
    const isVideo = /\.(mp4|mov|webm|mkv|avi)(\?|$)/i.test(data.fileUrl);
    items.push({ url: data.fileUrl, type: isVideo ? "video" : "image" });
    return items;
  }

  return items;
}

const QUESTION_LABELS = {
  rating1: "1. The needed equipment/resources are available.",
  rating2: "2. The equipment/resources are working properly.",
  rating3: "3. The facility has enough resources to meet users' needs.",
  rating4: "4. The facility is clean and well-maintained.",
  rating5: "5. The furniture (chairs, tables, etc.) is in good condition.",
  rating6: "6. The facility is well-lit and properly ventilated.",
  rating7: "7. The facility layout allows for comfortable movement.",
  rating8: "8. The facility is free from safety hazards.",
  rating9: "9. Air conditioning is excellent.",
  rating10: "10. How satisfied are you with this facility?"
};

function evalAvg(ev) {
  const ratings = [
    ev.rating1, ev.rating2, ev.rating3, ev.rating4, ev.rating5,
    ev.rating6, ev.rating7, ev.rating8, ev.rating9, ev.rating10
  ];
  return ratings.reduce((sum, r) => sum + r, 0) / ratings.length;
}

// ======================
// LOAD OFFICES -> office-names collection
// ======================
const officeCollRef = collection(db, OFFICE_COLLECTION);

onSnapshot(officeCollRef, (snapshot) => {
  offices = {};
  snapshot.forEach((docSnap) => {
    const val = docSnap.data();
    offices[docSnap.id] = (val && val.name) ? val.name : docSnap.id;
  });

  populateOfficeFilter();
  renderSubmissions();
}, (err) => {
  console.error("Failed to load offices:", err);
});


const evalCollRef = collection(db, EVAL_COLLECTION);

onSnapshot(evalCollRef, (snapshot) => {
  evaluations = snapshot.docs.map((docSnap) => {
    const ev = docSnap.data();
    const id = docSnap.id;

    return {
      id,
      officeName: ev.officeName || "Unknown",
      comments: ev.comments || "",
      category: ev.category || "",
      course: ev.course || "",
      year: ev.year || "",
      sex: ev.sex || "",
      userCategory: ev.userCategory || "",
      userId: ev.userId || "",
      evidence: parseEvidence(ev),
      transactionCode: ev.transactionCode || "",
      rawStatus: ev.status || "",
      rating1: Number(ev.rating1) || 0,
      rating2: Number(ev.rating2) || 0,
      rating3: Number(ev.rating3) || 0,
      rating4: Number(ev.rating4) || 0,
      rating5: Number(ev.rating5) || 0,
      rating6: Number(ev.rating6) || 0,
      rating7: Number(ev.rating7) || 0,
      rating8: Number(ev.rating8) || 0,
      rating9: Number(ev.rating9) || 0,
      rating10: Number(ev.rating10) || 0,
      date: parseEvalDate(ev)
    };
  }).map(ev => {
    const avgRating = evalAvg(ev);
    return {
      ...ev,
      code: makeCode(ev.officeName, ev.id),
      avgRating,
      status: parseEvalStatus({ status: ev.rawStatus }, avgRating)
    };
  });

  renderSubmissions();
}, (err) => {
  console.error("Failed to load facility evaluations:", err);
});

// ======================
// TABS WIRING
// ======================
document.getElementById("eval-tabs").addEventListener("click", (ev) => {
  const btn = ev.target.closest(".eval-tab");
  if (!btn) return;
  currentTab = btn.getAttribute("data-tab");
  document.querySelectorAll(".eval-tab").forEach(t => t.classList.toggle("active", t === btn));
  renderSubmissions();
});

// ======================
// RENDER
// ======================
function populateOfficeFilter() {
  const select = document.getElementById("office-filter");
  const currentValue = select.value;

  const options = ['<option value="">All Offices</option>']
    .concat(Object.values(offices).map(name => `<option value="${name}">${name}</option>`));

  select.innerHTML = options.join("");
  select.value = currentValue;
}

function getFilteredSubmissions() {
  const term = searchTerm.trim().toLowerCase();

  return evaluations
    .filter(e => currentTab === "recent" ? true : e.status === currentTab)
    .filter(e => !officeFilter || e.officeName === officeFilter)
    .filter(e => {
      if (!term) return true;
      return (
        e.code.toLowerCase().includes(term) ||
        e.officeName.toLowerCase().includes(term) ||
        e.comments.toLowerCase().includes(term)
      );
    })
    .sort((a, b) => b.date - a.date);
}

// Builds the Evidence <td> cell — a clickable badge summarizing image
// and video counts, or "No evidence" if the record has none. Clicking
// it opens the same detail modal as the View action.
function evidenceCellHtml(e) {
  const imgCount = e.evidence.filter(item => item.type === "image").length;
  const vidCount = e.evidence.filter(item => item.type === "video").length;

  if (imgCount === 0 && vidCount === 0) {
    return `<span class="evidence-badge empty">No evidence</span>`;
  }

  const parts = [];
  if (imgCount) parts.push(`📷 ${imgCount}`);
  if (vidCount) parts.push(`🎥 ${vidCount}`);

  return `<span class="evidence-badge evidence-cell" data-eval-id="${e.id}">${parts.join("  ")}</span>`;
}

function renderSubmissions() {
  const filtered = getFilteredSubmissions();

  document.getElementById("stat-total").textContent = evaluations.length;
  const distinctOffices = new Set(evaluations.map(e => e.officeName));
  document.getElementById("stat-offices").textContent = distinctOffices.size;

  const totalImages = evaluations.reduce(
    (sum, e) => sum + e.evidence.filter(item => item.type === "image").length,
    0
  );
  const totalVideos = evaluations.reduce(
    (sum, e) => sum + e.evidence.filter(item => item.type === "video").length,
    0
  );
  document.getElementById("stat-images").textContent = totalImages;
  document.getElementById("stat-videos").textContent = totalVideos;

  const pendingCount = evaluations.filter(e => e.status === "pending").length;
  const noActionCount = evaluations.filter(e => e.status === "no_action").length;
  const resolvedCount = evaluations.filter(e => e.status === "resolved").length;
  document.getElementById("stat-pending").textContent = pendingCount;
  document.getElementById("stat-no-action").textContent = noActionCount;
  document.getElementById("stat-resolved").textContent = resolvedCount;

  document.getElementById("tab-count-recent").textContent = evaluations.length;
  document.getElementById("tab-count-pending").textContent = pendingCount;
  document.getElementById("tab-count-no_action").textContent = noActionCount;
  document.getElementById("tab-count-resolved").textContent = resolvedCount;

  const tbody = document.getElementById("submissions-tbody");
  const showActionColumn = currentTab !== "recent";
  document.getElementById("action-col-header").style.display = showActionColumn ? "" : "none";
  // #, Office, Q1..Q10, Comments, Evidence, Status, Date [, Action]
  const colCount = showActionColumn ? 17 : 16;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="${colCount}">No submissions found.</td></tr>`;
    return;
  }

  const showEditButtonForTab = showActionColumn && currentTab !== "no_action";

  tbody.innerHTML = filtered.map((e, i) => {
    const date = e.date ? new Date(e.date).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "-";
    const meta = STATUS_META[e.status] || STATUS_META.pending;
    const ratingCells = [
      e.rating1, e.rating2, e.rating3, e.rating4, e.rating5,
      e.rating6, e.rating7, e.rating8, e.rating9, e.rating10
    ].map(r => `<td class="rating-cell">${r}</td>`).join("");
    const actionCell = showActionColumn ? `
        <td>
          <button class="btn-view" data-eval-id="${e.id}">View</button>
          ${showEditButtonForTab ? `<button class="btn-edit" data-eval-id="${e.id}">Edit</button>` : ""}
        </td>` : "";
    return `
      <tr>
        <td class="row-index">${i + 1}</td>
        <td>${e.officeName}</td>
        ${ratingCells}
        <td>${e.comments || "-"}</td>
        <td>${evidenceCellHtml(e)}</td>
        <td><span class="status-badge ${e.status}">${meta.icon} ${meta.label}</span></td>
        <td>${date}</td>${actionCell}
      </tr>
    `;
  }).join("");

  tbody.querySelectorAll(".btn-view").forEach(btn => {
    btn.addEventListener("click", () => openDetailModal(btn.getAttribute("data-eval-id")));
  });
  tbody.querySelectorAll(".btn-edit").forEach(btn => {
    btn.addEventListener("click", () => openEditModal(btn.getAttribute("data-eval-id")));
  });
  tbody.querySelectorAll(".evidence-cell").forEach(badge => {
    badge.addEventListener("click", () => openDetailModal(badge.getAttribute("data-eval-id")));
  });
}

// ======================
// SEARCH / FILTER WIRING
// ======================
document.getElementById("search-input").addEventListener("input", (ev) => {
  searchTerm = ev.target.value;
  renderSubmissions();
});

document.getElementById("office-filter").addEventListener("change", (ev) => {
  officeFilter = ev.target.value;
  renderSubmissions();
});

// ======================
// REFRESH
// ======================
document.getElementById("btn-refresh").addEventListener("click", () => {
  const btn = document.getElementById("btn-refresh");
  const original = btn.textContent;
  btn.textContent = "🔄 Refreshing...";
  btn.disabled = true;
  renderSubmissions();
  setTimeout(() => {
    btn.textContent = original;
    btn.disabled = false;
  }, 500);
});

// ======================
// EXPORT CSV
// ======================
document.getElementById("btn-export").addEventListener("click", () => {
  const filtered = getFilteredSubmissions();

  if (filtered.length === 0) {
    alert("No submissions to export.");
    return;
  }

  const header = [
    "#", "Office", "Category", "Course", "Year", "Sex", "Respondent Type",
    "Q1", "Q2", "Q3", "Q4", "Q5", "Q6", "Q7", "Q8", "Q9", "Q10", "Avg",
    "Comments", "Image URLs", "Video URLs", "Status", "Date"
  ];
  const rows = filtered.map((e, i) => {
    const date = e.date ? new Date(e.date).toLocaleDateString() : "-";
    const comments = `"${(e.comments || "").replace(/"/g, '""')}"`;
    const status = (STATUS_META[e.status] || STATUS_META.pending).label;
    const imageUrls = `"${e.evidence.filter(item => item.type === "image").map(item => item.url).join(" | ")}"`;
    const videoUrls = `"${e.evidence.filter(item => item.type === "video").map(item => item.url).join(" | ")}"`;
    return [
      i + 1, e.officeName, e.category, e.course, e.year, e.sex, e.userCategory,
      e.rating1, e.rating2, e.rating3, e.rating4, e.rating5,
      e.rating6, e.rating7, e.rating8, e.rating9, e.rating10,
      e.avgRating.toFixed(1), comments, imageUrls, videoUrls, status, date
    ].join(",");
  });

  const csvContent = [header.join(","), ...rows].join("\n");
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = `facilities-submissions-${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
});

// ======================
// VIEW DETAIL MODAL
// ======================
const detailModal = document.getElementById("detail-modal");
const detailModalBody = document.getElementById("detail-modal-body");

function evidenceGalleryHtml(e) {
  if (!e.evidence.length) {
    return `<div class="evidence-empty-note">No images or videos were attached.</div>`;
  }

  const items = e.evidence.map(item => {
    if (item.type === "video") {
      return `
        <a class="evidence-gallery-item" href="${item.url}" target="_blank" rel="noopener">
          <video src="${item.url}" muted></video>
          <span class="evidence-type-tag">Video</span>
        </a>`;
    }
    return `
      <a class="evidence-gallery-item" href="${item.url}" target="_blank" rel="noopener">
        <img src="${item.url}" alt="Evidence" loading="lazy">
        <span class="evidence-type-tag">Image</span>
      </a>`;
  }).join("");

  return `<div class="evidence-gallery">${items}</div>`;
}

function openDetailModal(evalId) {
  const e = evaluations.find(item => item.id === evalId);
  if (!e) return;

  const date = e.date ? new Date(e.date).toLocaleString() : "-";
  const statusLabel = (STATUS_META[e.status] || STATUS_META.pending).label;

  const questionRows = Object.entries(QUESTION_LABELS)
    .map(([key, label]) => `<div class="modal-row"><span>${label}</span><span>${e[key]}</span></div>`)
    .join("");

  const optionalRows = [
    e.category ? `<div class="modal-row"><span>Category</span><span>${e.category}</span></div>` : "",
    e.userCategory ? `<div class="modal-row"><span>Respondent Type</span><span>${e.userCategory}</span></div>` : "",
    e.course ? `<div class="modal-row"><span>Course</span><span>${e.course}</span></div>` : "",
    e.year ? `<div class="modal-row"><span>Year Level</span><span>${e.year}</span></div>` : "",
    e.sex ? `<div class="modal-row"><span>Sex</span><span>${e.sex}</span></div>` : "",
    e.transactionCode ? `<div class="modal-row"><span>Transaction Code</span><span>${e.transactionCode}</span></div>` : ""
  ].join("");

  detailModalBody.innerHTML = `
    <div class="modal-row"><span>Office</span><span>${e.officeName}</span></div>
    ${optionalRows}
    <div class="modal-row"><span>Avg Rating</span><span>${e.avgRating.toFixed(1)} / 5</span></div>
    ${questionRows}
    <div class="modal-row"><span>Comments</span><span>${e.comments || "-"}</span></div>
    <div class="modal-row"><span>Status</span><span>${statusLabel}</span></div>
    <div class="modal-row"><span>Submitted</span><span>${date}</span></div>
    <div class="modal-row" style="display:block;">
      <span style="display:block; margin-bottom:8px;">Evidence</span>
      ${evidenceGalleryHtml(e)}
    </div>
  `;

  detailModal.classList.add("open");
}

document.getElementById("detail-modal-close").addEventListener("click", () => {
  detailModal.classList.remove("open");
});
detailModal.addEventListener("click", (ev) => {
  if (ev.target === detailModal) detailModal.classList.remove("open");
});

// ======================
// EDIT MODAL
// ======================
const editModal = document.getElementById("edit-modal");
const editModalMeta = document.getElementById("edit-modal-meta");
const editStatusSelect = document.getElementById("edit-status-select");
const editSaveBtn = document.getElementById("edit-modal-save");

function openEditModal(evalId) {
  const e = evaluations.find(item => item.id === evalId);
  if (!e) return;

  const date = e.date ? new Date(e.date).toLocaleString() : "-";

  editingId = evalId;
  editModalMeta.innerHTML = `
    <div class="modal-row"><span>Office</span><span>${e.officeName}</span></div>
    <div class="modal-row"><span>ID</span><span>${e.id}</span></div>
    <div class="modal-row"><span>Avg Rating</span><span>${e.avgRating.toFixed(1)} / 5</span></div>
    <div class="modal-row"><span>Date</span><span>${date}</span></div>
  `;
  editStatusSelect.value = e.status;

  editModal.classList.add("open");
}

document.getElementById("edit-modal-cancel").addEventListener("click", () => {
  editModal.classList.remove("open");
  editingId = null;
});
editModal.addEventListener("click", (ev) => {
  if (ev.target === editModal) {
    editModal.classList.remove("open");
    editingId = null;
  }
});

editSaveBtn.addEventListener("click", async () => {
  if (!editingId) return;

  const newStatus = editStatusSelect.value;

  editSaveBtn.disabled = true;
  editSaveBtn.textContent = "Saving...";

  try {
    // Update the primary record. Also mirror the status onto the
    // evaluation_history copy the Kotlin app writes alongside it on
    // submit, so both collections stay in sync. If a matching history
    // doc doesn't exist (older records, or if you don't rely on that
    // collection), this second update is swallowed silently.
    await updateDoc(doc(db, EVAL_COLLECTION, editingId), {
      status: newStatus
    });

    try {
      await updateDoc(doc(db, HISTORY_COLLECTION, editingId), {
        status: newStatus
      });
    } catch (historyErr) {
      console.warn("No matching evaluation_history doc to update:", historyErr);
    }

    editModal.classList.remove("open");
    editingId = null;
  } catch (err) {
    alert("Failed to save changes. Please try again.");
    console.error(err);
  } finally {
    editSaveBtn.disabled = false;
    editSaveBtn.textContent = "Save Changes";
  }
});

</script>
</body>
